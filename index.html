<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Protocol</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protocol">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#0b1220; --card:#131c2e; --card2:#1a2540; --line:#233150;
  --text:#e8eefc; --dim:#8b9ac2; --accent:#38bdf8; --green:#34d399;
  --amber:#fbbf24; --red:#f87171; --purple:#a78bfa;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
  padding-top:var(--safe-top);overscroll-behavior-y:none;-webkit-user-select:none;user-select:none}
#app{max-width:560px;margin:0 auto;padding:12px 14px calc(88px + var(--safe-bottom))}
h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
h2{font-size:15px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px}
.sub{color:var(--dim);font-size:13px;margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1}
button{font-family:inherit;border:none;border-radius:12px;cursor:pointer;font-weight:600}
.btn{background:var(--card2);color:var(--text);padding:10px 14px;font-size:14px;border:1px solid var(--line)}
.btn.primary{background:var(--accent);color:#03121f;border:none}
.btn.green{background:var(--green);color:#052e1b;border:none}
.btn.danger{color:var(--red)}
.btn.small{padding:6px 10px;font-size:12px;border-radius:9px}
.btn:active{opacity:.7}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,18,32,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:8px 4px calc(8px + var(--safe-bottom));z-index:50}
nav button{background:none;color:var(--dim);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 7px}
nav button.on{color:var(--accent)}
nav .ico{font-size:19px;line-height:1}
.bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden;margin-top:5px}
.bar>i{display:block;height:100%;border-radius:6px;transition:width .35s}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px}
.stat b{font-size:17px}
.stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.tl-item{display:flex;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);align-items:flex-start}
.tl-item:last-child{border-bottom:none}
.tl-item .time{width:64px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--dim);padding-top:3px;font-variant-numeric:tabular-nums}
.tl-item .what{flex:1;font-size:14px;font-weight:600}
.tl-item .note{font-size:12px;color:var(--dim);font-weight:400;margin-top:2px}
.tl-item.done .what{color:var(--dim);text-decoration:line-through}
.tl-item.now{background:linear-gradient(90deg,rgba(56,189,248,.12),transparent);border-radius:10px}
.tl-item.now .time{color:var(--accent)}
.chk{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;background:var(--card2)}
.tl-item.done .chk{background:var(--green);border-color:var(--green);color:#052e1b}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--card2);color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.tag.wo{background:rgba(167,139,250,.15);color:var(--purple)}
.tag.food{background:rgba(52,211,153,.15);color:var(--green)}
.tag.hard{background:rgba(251,191,36,.15);color:var(--amber)}
.entry{display:flex;align-items:center;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px}
.entry:last-child{border-bottom:none}
.entry .macros{font-size:12px;color:var(--dim)}
.qbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.qbtns button{background:var(--card);border:1px solid var(--line);color:var(--text);padding:10px 6px;border-radius:14px;font-size:12px;line-height:1.35}
.qbtns b{display:block;font-size:13px}
.qbtns span{color:var(--dim);font-size:11px}
input,textarea,select{font-family:inherit;background:var(--card2);border:1px solid var(--line);color:var(--text);
  border-radius:11px;padding:11px 12px;font-size:16px;width:100%;-webkit-user-select:text;user-select:text}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
label{font-size:12px;color:var(--dim);font-weight:600;display:block;margin:10px 0 4px}
.days{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
.days button{flex-shrink:0;background:var(--card);border:1px solid var(--line);color:var(--dim);padding:8px 13px;border-radius:20px;font-size:13px}
.days button.on{background:var(--accent);color:#03121f;border-color:var(--accent);font-weight:700}
.routine{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.routine h3{font-size:15px}
.routine .meta{font-size:12px;color:var(--accent);font-weight:600;margin:2px 0 6px}
.routine .ex{font-size:13px;color:var(--dim);line-height:1.55}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center}
#modal.open{display:flex}
#modal .sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:18px 16px calc(20px + var(--safe-bottom));max-height:85vh;overflow-y:auto}
#modal h3{font-size:17px;margin-bottom:4px}
.mrow{display:flex;gap:8px}
.mrow>div{flex:1}
.water-btns{display:flex;gap:8px}
.water-btns button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--accent);padding:9px 4px;border-radius:11px;font-size:13px}
.toast{position:fixed;top:calc(var(--safe-top) + 10px);left:50%;transform:translateX(-50%);background:var(--green);color:#052e1b;
  padding:10px 18px;border-radius:24px;font-weight:700;font-size:14px;z-index:200;display:none;max-width:88vw;text-align:center}
.toast.warn{background:var(--amber);color:#3b2a03}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:16px 0}
.pill-count{background:var(--card2);border-radius:9px;padding:2px 8px;font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
/* owala bottles */
.owalas{display:flex;gap:10px;margin:10px 0 12px;justify-content:center}
.bottle{width:34px;height:58px;border:2px solid var(--line);border-radius:10px 10px 12px 12px;position:relative;overflow:hidden;background:var(--card2)}
.bottle:before{content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:14px;height:8px;border:2px solid var(--line);border-bottom:none;border-radius:5px 5px 0 0}
.bottle .fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#60a5fa,#38bdf8);transition:height .35s}
.bottle.full{border-color:#60a5fa}
/* gym mode */
.gym-ex{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
.gym-ex h3{font-size:17px}
.gym-ex .target{font-size:13px;color:var(--purple);font-weight:700;margin:2px 0}
.gym-ex .last{font-size:12px;color:var(--dim);margin-bottom:8px}
.set-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.set-row .setn{width:44px;font-size:13px;font-weight:700;color:var(--dim)}
.set-row input{padding:12px 10px;font-size:18px;font-weight:700;text-align:center}
.set-row .x{color:var(--dim);font-size:14px}
.set-row .unit{font-size:12px;color:var(--dim);width:22px}
.gym-head{position:sticky;top:0;background:var(--bg);padding:8px 0 10px;z-index:5}
/* notebook */
.spark{width:100%;height:90px;display:block}
.logcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:8px}
.logcard h3{font-size:14px}
.logcard .sub{font-size:12px}
.seg{display:flex;background:var(--card2);border-radius:12px;padding:3px;margin-bottom:12px}
.seg button{flex:1;background:none;color:var(--dim);padding:9px;font-size:13px;border-radius:10px}
.seg button.on{background:var(--card);color:var(--text)}
.caff-cut{font-size:12px;font-weight:700;margin-top:8px}
/* motivation */
.hero-img{width:100%;border-radius:18px;display:block;object-fit:cover;max-height:60vh;background:var(--card2)}
.upload-btn{position:relative;overflow:hidden;display:inline-block}
.upload-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.thumb{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--card2)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:8px;background:rgba(11,18,32,.75);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav"></nav>
<div id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ================= DATA ================= */
const DAYS=["sun","mon","tue","wed","thu","fri","sat"];
const DAYNAMES={sun:"Sunday",mon:"Monday",tue:"Tuesday",wed:"Wednesday",thu:"Thursday",fri:"Friday",sat:"Saturday"};
const uid=()=>Math.random().toString(36).slice(2,9);
const OWALA=32, CAFF_LIMIT_DEFAULT=400, CAFF_CUTOFF=14*60; // 2:00pm

function it(time,what,note="",tag="",remind=false){return{id:uid(),time,what,note,tag,remind}}
function eveningBlock(){return[
  it("7:30pm","Meal 2 — 900 cal / 80g protein","300g chicken/salmon/beef, lentils, 2 cups veg, sweet potato","food",true),
  it("8:00pm","EATING WINDOW CLOSES","Caffeine ointment (scalp)","",true),
  it("8:30pm","Magnesium Glycinate + Ashwagandha","",""),
  it("9:00pm","L-Theanine · screens off","","",true),
  it("9:02pm","Brush, floss, retainer, mouth tape","Tongue scrape first",""),
  it("9:15pm","Melatonin 0.3mg","",""),
  it("9:30pm","Warm shower","Temperature drop for sleep onset",""),
  it("10:00pm","SLEEP","","",true)]}
function morningBlock(){return[
  it("6:30am","Wake","500ml water + 1/4 tsp Himalayan salt","",true),
  it("6:35am","Sunlight 5–10 min","Outside, no sunglasses","")]}
function workBlock(){return[
  it("9:00am","Work begins","",""),
  it("10:00am","Coffee #2 (~95mg)","",""),
  it("10:30am","Coffee #3 / green tea","HARD CAFFEINE CUTOFF","hard",true),
  it("12:00pm","Meal 1 — 900 cal / 70g protein","Creatine, Curcumin, Omega-3, Zinc, Saw Palmetto","food",true),
  it("12:00pm","Mastic gum (post meal)","30–45 min, chew both sides",""),
  it("12:50pm","45 min lunch walk","75 Hard walk, outdoor","hard",true),
  it("1:35pm","Back at desk","","")]}

function seedSchedule(){
 const s={};
 s.mon=[...morningBlock(),
  it("6:40am","Collect dry cleaning","Pick up on way to gym",""),
  it("6:45am","AM Strength — Push","Bench, OHP, incline DB, dips, laterals","wo",true),
  it("7:35am","20 min Stairmaster","HR 130–150bpm","wo"),
  it("7:55am","Hot shower","Steam shower post-training",""),
  it("8:10am","Shave routine","WTG + ATG, witch hazel, niacinamide, Cicaplast, CeraVe SPF",""),
  it("8:20am","Minoxidil foam","Temples + widow's peaks",""),
  it("8:25am","Coffee #1 (~95mg)","Black only",""),
  it("8:30am","Walk to work","12 min (~1,500 steps)",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","12 min",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","Whey shake + banana + almonds","food",true),
  it("5:30pm","PM Rugby session","Full training","wo",true),
  it("6:45pm","PM Run (30 min)","Outdoor post-rugby, easy pace, 75 Hard","hard",true),
  it("7:15pm","Home — shower","Post-sweat cleanse",""),
  ...eveningBlock()];
 s.tue=[...morningBlock(),
  it("6:45am","AM Strength — Pull","Deadlift, rows, pull-ups, face pulls, curls","wo",true),
  it("7:35am","20 min Stairmaster","","wo"),
  it("7:55am","Hot shower","Post-training steam shower",""),
  it("8:10am","Shave routine","Full routine",""),
  it("8:20am","Minoxidil foam","",""),
  it("8:25am","Coffee #1","",""),
  it("8:30am","Walk to work","12 min",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Swimming","1,400–1,600m structured","wo",true),
  it("6:45pm","Done — shower","",""),
  ...eveningBlock()];
 s.wed=[...morningBlock(),
  it("6:45am","AM Stretching session","Foam roll, hips, posterior chain, shoulders, spine","wo",true),
  it("7:35am","40 min Stairmaster","HR 120–135bpm, active recovery","wo"),
  it("8:15am","Hot shower","Post-training",""),
  it("8:30am","Shave routine","",""),
  it("8:40am","Minoxidil foam","",""),
  it("8:45am","Coffee #1","",""),
  it("8:50am","Walk to work","12 min",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","",""),
  it("5:15pm","Pre-WO snack (light)","Lower intensity day","food"),
  it("5:30pm","45 min outdoor walk","75 Hard PM","hard",true),
  it("6:15pm","Home","",""),
  ...eveningBlock()];
 s.thu=[...morningBlock(),
  it("6:40am","Microneedle session","0.5–0.75mm, temples + hairline before training",""),
  it("6:50am","AM Strength — Upper Hypertrophy","Cable work, DB variations, high volume","wo",true),
  it("7:40am","20 min Stairmaster","","wo"),
  it("8:00am","Hot shower","Post-training steam shower",""),
  it("8:15am","Shave routine","",""),
  it("8:25am","Minoxidil foam","24hrs after microneedle — apply as normal",""),
  it("8:30am","Coffee #1","",""),
  it("8:35am","Walk to work","12 min",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Swimming","1,400–1,600m structured","wo",true),
  it("6:45pm","Done — shower","",""),
  ...eveningBlock()];
 s.fri=[...morningBlock(),
  it("6:45am","AM Strength — Full Body","Power cleans, front squat, weighted pull-ups, farmers carries","wo",true),
  it("7:35am","20 min Stairmaster","","wo"),
  it("7:55am","Cold shower","No shave Fridays",""),
  it("8:10am","Minoxidil foam","Face cleanse only",""),
  it("8:15am","Coffee #1","",""),
  it("8:20am","Walk to work","12 min",""),
  ...workBlock(),
  it("2:00pm","Work ends","Early finish",""),
  it("2:12pm","Walk to dry cleaner","Drop 7 shirts — collect Monday 6:40am","",true),
  it("2:35pm","Home — rest","",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Rugby session","","wo",true),
  it("6:45pm","PM Run (30–40 min)","Outdoor, 75 Hard","hard",true),
  it("7:15pm","Home — shower","",""),
  ...eveningBlock()];
 s.sat=[...morningBlock(),
  it("6:45am","AM Strength — Legs","Squat, RDL, leg press, lunges, calves","wo",true),
  it("7:35am","20 min Stairmaster","","wo"),
  it("7:55am","Cold shower","No shave",""),
  it("8:10am","Minoxidil foam","",""),
  it("8:15am","Coffee #1","",""),
  it("9:15am","Coffee #2","",""),
  it("10:30am","CAFFEINE CUTOFF","","hard",true),
  it("10:30am","Leisure / errands / rest","",""),
  it("12:00pm","Meal 1 — 900 cal / 70g protein","All AM supplements + creatine","food",true),
  it("12:00pm","Mastic gum (post meal)","30–45 min",""),
  it("1:00pm","45 min walk","75 Hard, outdoor","hard",true),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Rugby session","","wo",true),
  it("7:00pm","Home — shower","",""),
  ...eveningBlock()];
 s.sun=[...morningBlock(),
  it("6:45am","AM Stretching session","Full mobility — foam roll, hips, posterior chain, shoulders, spine","wo",true),
  it("7:35am","40 min Stairmaster","Easy, HR 120–135bpm","wo"),
  it("8:15am","Cold shower","No shave",""),
  it("8:30am","Minoxidil foam","",""),
  it("8:35am","Coffee #1","",""),
  it("9:35am","Coffee #2","",""),
  it("10:00am","Meal prep for week","Cook proteins, portion meals, prep snacks","",true),
  it("10:30am","CAFFEINE CUTOFF","","hard",true),
  it("12:00pm","Meal 1 — 900 cal / 70g protein","All AM supplements + creatine","food",true),
  it("12:00pm","Mastic gum (post meal)","30–45 min",""),
  it("1:00pm","Rest / reading / admin","",""),
  it("3:00pm","Shopping","75 Hard walk — 2hrs on feet","hard",true),
  it("5:00pm","Home — change for Mass","",""),

  it("7:15pm","Home","",""),
  ...eveningBlock()];
 return s;
}
const ex=(name,sets,reps)=>({name,sets,reps});
function seedRoutines(){return[
 {id:uid(),name:"Push",days:["mon"],time:"6:45am",cardio:"20 min Stairmaster (HR 130–150)",exercises:[
  ex("Bench press",4,"6-8"),ex("Overhead press",3,"8-10"),ex("Incline DB press",3,"8-12"),ex("Tricep dips",3,"10-12"),ex("Lateral raises",3,"12-15")]},
 {id:uid(),name:"Pull",days:["tue"],time:"6:45am",cardio:"20 min Stairmaster",exercises:[
  ex("Deadlift",4,"5"),ex("Barbell rows",4,"8"),ex("Pull-ups",3,"8-10"),ex("Face pulls",3,"12-15"),ex("Bicep curls",3,"10-12")]},
 {id:uid(),name:"Stretching & Mobility",days:["wed","sun"],time:"6:45am",cardio:"40 min Stairmaster (HR 120–135)",exercises:[
  ex("Foam roll",1,"5 min"),ex("Hip flexor stretch",2,"60s/side"),ex("Posterior chain stretch",2,"60s"),ex("Shoulder mobility",2,"10 reps"),ex("Spine mobility",2,"10 reps")]},
 {id:uid(),name:"Upper Hypertrophy",days:["thu"],time:"6:50am",cardio:"20 min Stairmaster",exercises:[
  ex("Cable flyes",3,"12-15"),ex("Cable rows",3,"12-15"),ex("DB shoulder press",3,"10-12"),ex("DB curls",3,"12-15"),ex("Cable pushdowns",3,"12-15")]},
 {id:uid(),name:"Full Body Compounds",days:["fri"],time:"6:45am",cardio:"20 min Stairmaster",exercises:[
  ex("Power cleans",5,"3"),ex("Front squat",4,"6"),ex("Weighted pull-ups",4,"6-8"),ex("Farmers carries",4,"40m")]},
 {id:uid(),name:"Legs",days:["sat"],time:"6:45am",cardio:"20 min Stairmaster",exercises:[
  ex("Squat",4,"6-8"),ex("Romanian deadlift",4,"8-10"),ex("Leg press",3,"10-12"),ex("Walking lunges",3,"10/leg"),ex("Calf raises",4,"12-15")]},
 {id:uid(),name:"Swimming",days:["tue","thu"],time:"5:30pm",cardio:"",exercises:[
  ex("Warm-up freestyle",1,"200m"),ex("Drill set",4,"50m"),ex("Main set",8,"100m (30s rest)"),ex("Sprints",4,"25m all-out"),ex("Cool-down",1,"200m")]},
 {id:uid(),name:"Rugby + Run",days:["mon","fri"],time:"5:30pm",cardio:"",exercises:[
  ex("Rugby training",1,"full session"),ex("Outdoor run",1,"30-40 min easy")]},
 {id:uid(),name:"Rugby",days:["sat"],time:"5:30pm",cardio:"",exercises:[
  ex("Rugby training",1,"full session")]},
]}

const DEFAULTS={
 targets:{cal:2100,protein:180,fiber:35,carbs:175,fat:75,oz:128,caffeine:CAFF_LIMIT_DEFAULT},
 schedule:null,routines:null,
 food:{},   // date -> [{id,name,cal,p,f,c,fat}]
 oz:{},     // date -> ounces of water
 caff:{},   // date -> [{id,name,mg,time}]
 done:{},   // date -> {itemId:true}
 log:[],    // completed workouts
 remindersOn:false
};
let DB;
function migrateV1(v1){
 const d=JSON.parse(JSON.stringify(DEFAULTS));
 d.schedule=v1.schedule||null; d.done=v1.done||{}; d.food=v1.food||{}; d.remindersOn=!!v1.remindersOn;
 if(v1.targets)Object.assign(d.targets,{cal:v1.targets.cal||2100,protein:v1.targets.protein||180,fiber:v1.targets.fiber||35});
 for(const k in (v1.water||{})) d.oz[k]=Math.round(v1.water[k]/29.57);
 if(v1.routines) d.routines=v1.routines.map(r=>({
   id:r.id,name:r.name,days:r.days||[],time:r.time||"5:30pm",
   cardio:(r.ex||"").split("\n").filter(l=>l.trim().startsWith("+")).map(l=>l.replace(/^\+\s*/,"")).join(" · "),
   exercises:(r.ex||"").split("\n").map(l=>l.trim()).filter(l=>l&&!l.startsWith("+")).map(l=>ex(l,3,"8-12"))
 }));
 return d;
}
function load(){
 try{DB=JSON.parse(localStorage.getItem("protocol_v2"))||null}catch(e){DB=null}
 if(!DB){
   let v1=null;try{v1=JSON.parse(localStorage.getItem("protocol_v1"))}catch(e){}

 }

 DB.log=DB.log||[];DB.oz=DB.oz||{};DB.caff=DB.caff||{};
 const T=DEFAULTS.targets;for(const k in T)if(DB.targets[k]==null)DB.targets[k]=T[k];
 save();

const todayKey=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
const todayDay=()=>DAYS[new Date().getDay()];
const nowMin=()=>new Date().getHours()*60+new Date().getMinutes();
function toMin(t){
 const m=t.trim().toLowerCase().match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);if(!m)return 0;
 let h=+m[1];if(m[3]==="pm"&&h!==12)h+=12;if(m[3]==="am"&&h===12)h=0;return h*60+ +m[2];
}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(k){const[y,m,d]=k.split("-");return new Date(+y,+m-1,+d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})}

function foodTotals(date){
 const list=DB.food[date]||[];
 return list.reduce((a,e)=>({cal:a.cal+(+e.cal||0),p:a.p+(+e.p||0),f:a.f+(+e.f||0),c:a.c+(+e.c||0),fat:a.fat+(+e.fat||0)}),{cal:0,p:0,f:0,c:0,fat:0});
}
function caffTotal(date){return (DB.caff[date]||[]).reduce((a,e)=>a+(+e.mg||0),0)}

  html+=`<div class="bottle ${fill>=1?'full':''}"><div class="fill" style="height:${fill*100}%"></div></div>`;
 }
 return html+'</div>';
}

function routinesForToday(){return DB.routines.filter(r=>r.days.includes(todayDay()))}
function woSheet(item){
 const cands=routinesForToday();
 // best match: closest routine time to item time
 let best=null,bd=1e9;
 for(const r of cands){const d=Math.abs(toMin(r.time)-toMin(item.time));if(d<bd){bd=d;best=r}}
 openSheet(`
  <h3>${esc(item.what)}</h3>
  <div class="sub" style="margin-bottom:12px">${esc(item.time)}${item.note?" · "+esc(item.note):""}</div>
  ${cands.length?cands.map(r=>`<button class="btn ${best&&r.id===best.id?'primary':''}" style="width:100%;margin-bottom:8px" onclick="startGym('${r.id}','${item.id}')">Start workout — ${esc(r.name)}</button>`).join("")
   :`<div class="empty">No routine scheduled for ${DAYNAMES[todayDay()]} — add one in Train</div>`}
  <button class="btn" style="width:100%" onclick="closeSheet();toggleDone('${item.id}')">Just mark ${(DB.done[todayKey()]||{})[item.id]?'undone':'done'}</button>`);
}

/* ---------- Gym mode ---------- */
function lastLogFor(routineId){
 for(let i=DB.log.length-1;i>=0;i--)if(DB.log[i].routineId===routineId)return DB.log[i];
 return null;
}
function startGym(routineId,itemId){
 closeSheet();
 const r=DB.routines.find(x=>x.id===routineId);if(!r)return;
 const last=lastLogFor(routineId);
 GYM={routineId,itemId:itemId||null,name:r.name,data:r.exercises.map(e=>{
   const lastEx=last?(last.ex.find(l=>l.name===e.name)||null):null;
   return {name:e.name,sets:e.sets,reps:e.reps,
     rows:Array.from({length:e.sets},(_,i)=>({
       w:lastEx&&lastEx.sets[i]?lastEx.sets[i].w:"",
       r:"",
       lastW:lastEx&&lastEx.sets[i]?lastEx.sets[i].w:"",
       lastR:lastEx&&lastEx.sets[i]?lastEx.sets[i].r:""}))};
 })};
 go("gym");
}
function vGym(){
 if(!GYM){TAB="today";return vToday()}
 const r=DB.routines.find(x=>x.id===GYM.routineId);
 return `

   <div class="row"><h1 class="grow">${esc(GYM.name)}</h1>
    <button class="btn small" onclick="if(confirm('Discard this workout?')){GYM=null;go('today')}">Cancel</button></div>
   <div class="sub">${new Date().toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})}${r&&r.cardio?" · "+esc(r.cardio):""}</div>
  </div>

    const hint=e.rows.some(s=>s.lastW||s.lastR)?`Last: ${e.rows.map(s=>s.lastW?`${s.lastW}×${s.lastR||"?"}`:"—").join(" · ")}`:"First time — set your baseline";
    return `<div class="gym-ex">
     <h3>${esc(e.name)}</h3>
     <div class="target">${e.sets} × ${esc(e.reps)}</div>
     <div class="last">${hint}</div>
     ${e.rows.map((s,si)=>`
      <div class="set-row">
        <div class="setn">Set ${si+1}</div>
        <input type="number" inputmode="decimal" placeholder="${s.lastW||'weight'}" value="${s.w!==""?s.w:""}" oninput="GYM.data[${ei}].rows[${si}].w=this.value">
        <div class="unit">lb</div><div class="x">×</div>
        <input type="number" inputmode="numeric" placeholder="${s.lastR||'reps'}" value="${s.r!==""?s.r:""}" oninput="GYM.data[${ei}].rows[${si}].r=this.value">
        <div class="unit">reps</div>
      </div>`).join("")}
    </div>`;}).join("")}
  <button class="btn green" style="width:100%;padding:16px;font-size:16px" onclick="finishGym()">Finish & log workout</button>`;
}
function finishGym(){
 const entry={id:uid(),date:todayKey(),routineId:GYM.routineId,name:GYM.name,
   ex:GYM.data.map(e=>({name:e.name,sets:e.rows.filter(s=>s.w!==""||s.r!=="").map(s=>({w:+s.w||0,r:+s.r||0}))}))
     .filter(e=>e.sets.length)};
 if(!entry.ex.length){toast("Enter at least one set",true);return}
 DB.log.push(entry);
 if(GYM.itemId){const d=todayKey();DB.done[d]=DB.done[d]||{};DB.done[d][GYM.itemId]=true}
 save();GYM=null;BOOKVIEW="history";go("book");toast("Workout logged");
}

function volume(l){let v=0;for(const e of l.ex)for(const s of e.sets)v+=s.w*s.r;return v}
function bookHistory(){

 if(!logs.length)return `<div class="empty">No workouts logged yet.<br>Start one from Today or Train.</div>`;
 return logs.map(l=>`
  <div class="logcard" onclick="logSheet('${l.id}')">

function logSheet(id){
 const l=DB.log.find(x=>x.id===id);if(!l)return;
 openSheet(`
  <h3>${esc(l.name)}</h3><div class="sub">${fmtDate(l.date)}</div>

  <div class="row" style="margin-top:16px">
   <button class="btn danger" onclick="if(confirm('Delete this workout log?')){DB.log=DB.log.filter(x=>x.id!=='${l.id}');save();closeSheet();render()}">Delete</button>
   <div class="grow"></div><button class="btn" onclick="closeSheet()">Close</button>
  </div>`);
}
function bookProgress(names){
 if(!names.length)return `<div class="empty">Log workouts to see progress charts</div>`;
 const sessions=DB.log.filter(l=>l.ex.some(e=>e.name===BOOKEX))
   .map(l=>({date:l.date,top:Math.max(...l.ex.find(e=>e.name===BOOKEX).sets.map(s=>s.w||0),0),
             sets:l.ex.find(e=>e.name===BOOKEX).sets}));
 const pr=sessions.length?Math.max(...sessions.map(s=>s.top)):0;
 return `
  <select onchange="BOOKEX=this.value;render()" style="margin-bottom:10px">
    ${names.map(n=>`<option ${n===BOOKEX?"selected":""}>${esc(n)}</option>`).join("")}
  </select>
  <div class="card">
    <div class="row"><div class="grow"><b style="font-size:16px">${esc(BOOKEX)}</b>
      <div class="sub">${sessions.length} session${sessions.length===1?"":"s"}</div></div>
      <div style="text-align:right"><div class="lbl" style="font-size:11px;color:var(--dim)">PR</div><b style="font-size:18px;color:var(--green)">${pr} lb</b></div></div>
    ${spark(sessions.map(s=>s.top))}
  </div>
  ${[...sessions].reverse().map(s=>`
   <div class="logcard"><div class="row"><div class="grow"><b style="font-size:13px">${fmtDate(s.date)}</b>
     <div class="sub">${s.sets.map(x=>`${x.w||0}×${x.r||0}`).join(" · ")}</div></div>
     <div class="pill-count" style="color:${s.top>=pr&&pr>0?'var(--green)':'var(--dim)'}">${s.top} lb</div></div></div>`).join("")}`;
}
function spark(vals){
 if(vals.length<2)return `<div class="empty" style="padding:10px 0">Log ${2-vals.length} more session${vals.length===1?"":"s"} to see the trend</div>`;
 const W=300,H=80,P=8;
 const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1;
 const pts=vals.map((v,i)=>`${P+i*(W-2*P)/(vals.length-1)},${H-P-(v-mn)/rg*(H-2*P)}`).join(" ");
 return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
   <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
   ${vals.map((v,i)=>`<circle cx="${P+i*(W-2*P)/(vals.length-1)}" cy="${H-P-(v-mn)/rg*(H-2*P)}" r="3.5" fill="${v>=mx?'var(--green)':'var(--accent)'}"/>`).join("")}
 </svg>`;
}

function history7(){
 let out="";
 for(let i=0;i<7;i++){
  const d=new Date();d.setDate(d.getDate()-i);
  const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const t=foodTotals(k);const lbl=i===0?"Today":d.toLocaleDateString(undefined,{weekday:"short"});
  const pct=Math.min(100,t.cal/DB.targets.cal*100);
  const over=t.cal>DB.targets.cal;
  out+=`<div class="row" style="padding:5px 0"><div style="width:52px;font-size:12px;color:var(--dim);font-weight:600">${lbl}</div>
   <div class="grow"><div class="bar" style="margin:0"><i style="width:${pct}%;background:${over?'var(--red)':'var(--green)'}"></i></div></div>
   <div class="pill-count">${t.cal}</div></div>`;
 }
 return out;
}

/* ---------- ICS export ---------- */
const BYDAY={sun:"SU",mon:"MO",tue:"TU",wed:"WE",thu:"TH",fri:"FR",sat:"SA"};
function downloadICS(){
 const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Protocol//EN","CALSCALE:GREGORIAN","X-WR-CALNAME:Protocol"];
 const now=new Date();
 for(const day of DAYS){
  for(const x of DB.schedule[day]){
   if(!x.remind)continue;
   const m=toMin(x.time);
   const d=new Date(now);
   const target=DAYS.indexOf(day);
   let diff=(target-d.getDay()+7)%7;
   const hh=Math.floor(m/60),mm=m%60;
   if(diff===0&&(hh*60+mm)<=(d.getHours()*60+d.getMinutes()))diff=7;
   d.setDate(d.getDate()+diff);
   const ds=d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
   const ts="T"+String(hh).padStart(2,"0")+String(mm).padStart(2,"0")+"00";
   const de=new Date(d);de.setHours(hh,mm+15);
   const dse=de.getFullYear()+String(de.getMonth()+1).padStart(2,"0")+String(de.getDate()).padStart(2,"0");
   const tse="T"+String(de.getHours()).padStart(2,"0")+String(de.getMinutes()).padStart(2,"0")+"00";
   const escI=s=>(s||"").replace(/\\/g,"\\\\").replace(/,/g,"\\,").replace(/;/g,"\\;");
   lines.push("BEGIN:VEVENT",
    "UID:"+x.id+"-"+day+"@protocol.local",
    "DTSTART:"+ds+ts,
    "DTEND:"+dse+tse,
    "RRULE:FREQ=WEEKLY;BYDAY="+BYDAY[day],
    "SUMMARY:"+escI(x.what),
    x.note?"DESCRIPTION:"+escI(x.note):"",
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+escI(x.what),"TRIGGER:-PT0M","END:VALARM",
    "END:VEVENT");
  }
 }
 lines.push("END:VCALENDAR");
 const blob=new Blob([lines.filter(Boolean).join("\r\n")],{type:"text/calendar"});
 dl(blob,"protocol-reminders.ics");
 toast("Calendar file downloaded");
}

/* ---------- motivation images (IndexedDB) ---------- */
const MOTIV_DB="protocol_media", MOTIV_STORE="images";
let motivImages=[]; // {id,url}
function openMotivDB(){
 return new Promise((resolve,reject)=>{
  const req=indexedDB.open(MOTIV_DB,1);
  req.onupgradeneeded=()=>{req.result.createObjectStore(MOTIV_STORE,{keyPath:"id"})};
  req.onsuccess=()=>resolve(req.result);
  req.onerror=()=>reject(req.error);
 });
}
async function loadMotivImages(){
 try{
  const db=await openMotivDB();
  const tx=db.transaction(MOTIV_STORE,"readonly");
  const all=await new Promise((res,rej)=>{const r=tx.objectStore(MOTIV_STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
  motivImages.forEach(m=>URL.revokeObjectURL(m.url));
  motivImages=all.map(r=>({id:r.id,url:URL.createObjectURL(r.blob)}));
 }catch(e){motivImages=[]}
 if(TAB==="motiv")render();
}
function fileToCompressedBlob(file){
 return new Promise((resolve,reject)=>{
  const img=new Image();
  const fr=new FileReader();
  fr.onload=()=>{
   img.onload=()=>{
    const max=1400;let w=img.width,h=img.height;
    if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    c.toBlob(b=>b?resolve(b):reject(new Error("toBlob failed")),"image/jpeg",0.85);
   };
   img.onerror=reject;img.src=fr.result;
  };
  fr.onerror=reject;fr.readAsDataURL(file);
 });
}
async function addMotivFiles(fileList){
 const db=await openMotivDB();
 for(const file of fileList){
  if(!file.type.startsWith("image/"))continue;
  const blob=await fileToCompressedBlob(file);
  await new Promise((res,rej)=>{
   const tx=db.transaction(MOTIV_STORE,"readwrite");
   tx.objectStore(MOTIV_STORE).put({id:uid(),blob});
   tx.oncomplete=res;tx.onerror=()=>rej(tx.error);
  });
 }
 await loadMotivImages();
 toast("Photos added");
}
async function delMotiv(id){
 const db=await openMotivDB();
 await new Promise((res,rej)=>{
  const tx=db.transaction(MOTIV_STORE,"readwrite");
  tx.objectStore(MOTIV_STORE).delete(id);
  tx.oncomplete=res;tx.onerror=()=>rej(tx.error);
 });
 await loadMotivImages();
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0}return Math.abs(h)}
function todaysMotivIndex(){return motivImages.length?hashStr(todayKey())%motivImages.length:0}
function vMotiv(){
 if(!motivImages.length){

     <button class="btn primary upload-btn">Upload photos<input type="file" accept="image/*" multiple onchange="addMotivFiles(this.files)"></button>

 }
 const today=motivImages[todaysMotivIndex()];
 return `

  </div>`;
}
