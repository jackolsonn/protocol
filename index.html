<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Protocol</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protocol">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#0b1220; --card:#131c2e; --card2:#1a2540; --line:#233150;
  --text:#e8eefc; --dim:#8b9ac2; --accent:#38bdf8; --green:#34d399;
  --amber:#fbbf24; --red:#f87171; --purple:#a78bfa;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
  padding-top:var(--safe-top);overscroll-behavior-y:none;-webkit-user-select:none;user-select:none}
#app{max-width:560px;margin:0 auto;padding:12px 14px calc(88px + var(--safe-bottom))}
h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
h2{font-size:15px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px}
.sub{color:var(--dim);font-size:13px;margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1}
button{font-family:inherit;border:none;border-radius:12px;cursor:pointer;font-weight:600}
.btn{background:var(--card2);color:var(--text);padding:10px 14px;font-size:14px;border:1px solid var(--line)}
.btn.primary{background:var(--accent);color:#03121f;border:none}
.btn.danger{color:var(--red)}
.btn.small{padding:6px 10px;font-size:12px;border-radius:9px}
.btn:active{opacity:.7}
/* nav */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,18,32,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:8px 6px calc(8px + var(--safe-bottom));z-index:50}
nav button{background:none;color:var(--dim);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px}
nav button.on{color:var(--accent)}
nav .ico{font-size:20px;line-height:1}
/* progress bars */
.bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden;margin-top:5px}
.bar>i{display:block;height:100%;border-radius:6px;transition:width .35s}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px}
.stat b{font-size:17px}
.stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
/* timeline */
.tl-item{display:flex;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);align-items:flex-start}
.tl-item:last-child{border-bottom:none}
.tl-item .time{width:64px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--dim);padding-top:3px;font-variant-numeric:tabular-nums}
.tl-item .what{flex:1;font-size:14px;font-weight:600}
.tl-item .note{font-size:12px;color:var(--dim);font-weight:400;margin-top:2px}
.tl-item.done .what{color:var(--dim);text-decoration:line-through}
.tl-item.now{background:linear-gradient(90deg,rgba(56,189,248,.12),transparent);border-radius:10px}
.tl-item.now .time{color:var(--accent)}
.chk{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;background:var(--card2)}
.tl-item.done .chk{background:var(--green);border-color:var(--green);color:#052e1b}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--card2);color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.tag.wo{background:rgba(167,139,250,.15);color:var(--purple)}
.tag.food{background:rgba(52,211,153,.15);color:var(--green)}
.tag.hard{background:rgba(251,191,36,.15);color:var(--amber)}
/* food */
.entry{display:flex;align-items:center;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px}
.entry:last-child{border-bottom:none}
.entry .macros{font-size:12px;color:var(--dim)}
.qbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.qbtns button{background:var(--card);border:1px solid var(--line);color:var(--text);padding:10px 6px;border-radius:14px;font-size:12px;line-height:1.35}
.qbtns b{display:block;font-size:13px}
.qbtns span{color:var(--dim);font-size:11px}
input,textarea,select{font-family:inherit;background:var(--card2);border:1px solid var(--line);color:var(--text);
  border-radius:11px;padding:11px 12px;font-size:16px;width:100%;-webkit-user-select:text;user-select:text}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
label{font-size:12px;color:var(--dim);font-weight:600;display:block;margin:10px 0 4px}
/* day pills */
.days{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
.days button{flex-shrink:0;background:var(--card);border:1px solid var(--line);color:var(--dim);padding:8px 13px;border-radius:20px;font-size:13px}
.days button.on{background:var(--accent);color:#03121f;border-color:var(--accent);font-weight:700}
/* routines */
.routine{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.routine h3{font-size:15px}
.routine .meta{font-size:12px;color:var(--accent);font-weight:600;margin:2px 0 6px}
.routine .ex{font-size:13px;color:var(--dim);white-space:pre-line;line-height:1.5}
/* modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center}
#modal.open{display:flex}
#modal .sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:18px 16px calc(20px + var(--safe-bottom));max-height:85vh;overflow-y:auto}
#modal h3{font-size:17px;margin-bottom:4px}
.mrow{display:flex;gap:8px}
.mrow>div{flex:1}
.water-btns{display:flex;gap:8px}
.water-btns button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--accent);padding:9px;border-radius:11px;font-size:13px}
.toast{position:fixed;top:calc(var(--safe-top) + 10px);left:50%;transform:translateX(-50%);background:var(--green);color:#052e1b;
  padding:10px 18px;border-radius:24px;font-weight:700;font-size:14px;z-index:200;display:none}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:16px 0}
.pill-count{background:var(--card2);border-radius:9px;padding:2px 8px;font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav"></nav>
<div id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ================= DATA ================= */
const DAYS=["sun","mon","tue","wed","thu","fri","sat"];
const DAYNAMES={sun:"Sunday",mon:"Monday",tue:"Tuesday",wed:"Wednesday",thu:"Thursday",fri:"Friday",sat:"Saturday"};
const uid=()=>Math.random().toString(36).slice(2,9);

function it(time,what,note="",tag="",remind=false){return{id:uid(),time,what,note,tag,remind}}
function eveningBlock(){return[
  it("7:30pm","Meal 2 — 900 cal / 80g protein","300g chicken/salmon/beef, lentils, 2 cups veg, sweet potato","food",true),
  it("8:00pm","EATING WINDOW CLOSES","Caffeine ointment (scalp)","",true),
  it("8:30pm","Magnesium Glycinate + Ashwagandha","",""),
  it("9:00pm","L-Theanine · screens off","","",true),
  it("9:02pm","Brush, floss, retainer, mouth tape","Tongue scrape first",""),
  it("9:15pm","Melatonin 0.3mg","",""),
  it("9:30pm","Warm shower","Temperature drop for sleep onset",""),
  it("10:00pm","SLEEP","","",true)]}
function morningBlock(){return[
  it("6:30am","Wake","500ml water + 1/4 tsp Himalayan salt","",true),
  it("6:35am","Sunlight 5–10 min","Outside, no sunglasses","")]}
function workBlock(){return[
  it("9:00am","Work begins","",""),
  it("10:00am","Coffee #2 (~95mg)","",""),
  it("10:30am","Coffee #3 / green tea","HARD CAFFEINE CUTOFF","hard",true),
  it("12:00pm","Meal 1 — 900 cal / 70g protein","Creatine, Curcumin, Omega-3, Zinc, Saw Palmetto","food",true),
  it("12:00pm","Mastic gum (post meal)","30–45 min, chew both sides",""),
  it("12:50pm","45 min lunch walk","75 Hard walk, outdoor","hard",true),
  it("1:35pm","Back at desk","","")]}

function seedSchedule(){
 const s={};
 s.mon=[...morningBlock(),
  it("6:40am","Collect dry cleaning","Pick up on way to gym",""),
  it("6:45am","AM Strength — Push","Bench, OHP, incline DB, dips, laterals","wo",true),
  it("7:35am","20 min Stairmaster","HR 130–150bpm","wo"),
  it("7:55am","Hot shower","Steam shower post-training",""),
  it("8:10am","Shave routine","WTG + ATG, witch hazel, niacinamide, Cicaplast, CeraVe SPF",""),
  it("8:20am","Minoxidil foam","Temples + widow's peaks",""),
  it("8:25am","Coffee #1 (~95mg)","Black only",""),
  it("8:30am","Walk to work","12 min (~1,500 steps)",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","12 min",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","Whey shake + banana + almonds","food",true),
  it("5:30pm","PM Rugby session","Full training","wo",true),
  it("6:45pm","PM Run (30 min)","Outdoor post-rugby, easy pace, 75 Hard","hard",true),
  it("7:15pm","Home — shower","Post-sweat cleanse",""),
  ...eveningBlock()];
 s.tue=[...morningBlock(),
  it("6:45am","AM Strength — Pull","Deadlift, rows, pull-ups, face pulls, curls","wo",true),
  it("7:35am","20 min Stairmaster","","wo"),
  it("7:55am","Hot shower","Post-training steam shower",""),
  it("8:10am","Shave routine","Full routine",""),
  it("8:20am","Minoxidil foam","",""),
  it("8:25am","Coffee #1","",""),
  it("8:30am","Walk to work","12 min",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Swimming","1,400–1,600m structured","wo",true),
  it("6:45pm","Done — shower","",""),
  ...eveningBlock()];
 s.wed=[...morningBlock(),
  it("6:45am","AM Stretching session","Foam roll, hips, posterior chain, shoulders, spine","wo",true),
  it("7:35am","40 min Stairmaster","HR 120–135bpm, active recovery","wo"),
  it("8:15am","Hot shower","Post-training",""),
  it("8:30am","Shave routine","",""),
  it("8:40am","Minoxidil foam","",""),
  it("8:45am","Coffee #1","",""),
  it("8:50am","Walk to work","12 min",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","",""),
  it("5:15pm","Pre-WO snack (light)","Lower intensity day","food"),
  it("5:30pm","45 min outdoor walk","75 Hard PM","hard",true),
  it("6:15pm","Home","",""),
  ...eveningBlock()];
 s.thu=[...morningBlock(),
  it("6:40am","Microneedle session","0.5–0.75mm, temples + hairline before training",""),
  it("6:50am","AM Strength — Upper Hypertrophy","Cable work, DB variations, high volume","wo",true),
  it("7:40am","20 min Stairmaster","","wo"),
  it("8:00am","Hot shower","Post-training steam shower",""),
  it("8:15am","Shave routine","",""),
  it("8:25am","Minoxidil foam","24hrs after microneedle — apply as normal",""),
  it("8:30am","Coffee #1","",""),
  it("8:35am","Walk to work","12 min",""),
  ...workBlock(),
  it("5:00pm","Work ends — walk home","",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Swimming","1,400–1,600m structured","wo",true),
  it("6:45pm","Done — shower","",""),
  ...eveningBlock()];
 s.fri=[...morningBlock(),
  it("6:45am","AM Strength — Full Body","Power cleans, front squat, weighted pull-ups, farmers carries","wo",true),
  it("7:35am","20 min Stairmaster","","wo"),
  it("7:55am","Cold shower","No shave Fridays",""),
  it("8:10am","Minoxidil foam","Face cleanse only",""),
  it("8:15am","Coffee #1","",""),
  it("8:20am","Walk to work","12 min",""),
  ...workBlock(),
  it("2:00pm","Work ends","Early finish",""),
  it("2:12pm","Walk to dry cleaner","Drop 7 shirts — collect Monday 6:40am","",true),
  it("2:35pm","Home — rest","",""),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Rugby session","","wo",true),
  it("6:45pm","PM Run (30–40 min)","Outdoor, 75 Hard","hard",true),
  it("7:15pm","Home — shower","",""),
  ...eveningBlock()];
 s.sat=[...morningBlock(),
  it("6:45am","AM Strength — Legs","Squat, RDL, leg press, lunges, calves","wo",true),
  it("7:35am","20 min Stairmaster","","wo"),
  it("7:55am","Cold shower","No shave",""),
  it("8:10am","Minoxidil foam","",""),
  it("8:15am","Coffee #1","",""),
  it("9:15am","Coffee #2","",""),
  it("10:30am","CAFFEINE CUTOFF","","hard",true),
  it("10:30am","Leisure / errands / rest","",""),
  it("12:00pm","Meal 1 — 900 cal / 70g protein","All AM supplements + creatine","food",true),
  it("12:00pm","Mastic gum (post meal)","30–45 min",""),
  it("1:00pm","45 min walk","75 Hard, outdoor","hard",true),
  it("5:15pm","Pre-WO snack — 300 cal / 30g","","food",true),
  it("5:30pm","PM Rugby session","","wo",true),
  it("7:00pm","Home — shower","",""),
  ...eveningBlock()];
 s.sun=[...morningBlock(),
  it("6:45am","AM Stretching session","Full mobility — foam roll, hips, posterior chain, shoulders, spine","wo",true),
  it("7:35am","40 min Stairmaster","Easy, HR 120–135bpm","wo"),
  it("8:15am","Cold shower","No shave",""),
  it("8:30am","Minoxidil foam","",""),
  it("8:35am","Coffee #1","",""),
  it("9:35am","Coffee #2","",""),
  it("10:00am","Meal prep for week","Cook proteins, portion meals, prep snacks","",true),
  it("10:30am","CAFFEINE CUTOFF","","hard",true),
  it("12:00pm","Meal 1 — 900 cal / 70g protein","All AM supplements + creatine","food",true),
  it("12:00pm","Mastic gum (post meal)","30–45 min",""),
  it("1:00pm","Rest / reading / admin","",""),
  it("3:00pm","Shopping","75 Hard walk — 2hrs on feet","hard",true),
  it("5:00pm","Home — change for Mass","",""),
  it("6:00pm","Mass","","",true),
  it("7:15pm","Home","",""),
  ...eveningBlock()];
 return s;
}
function seedRoutines(){return[
 {id:uid(),name:"Push",days:["mon"],time:"6:45am",ex:"Bench press\nOverhead press\nIncline DB press\nTricep dips\nLateral raises\n+ 20 min Stairmaster (HR 130–150)"},
 {id:uid(),name:"Pull",days:["tue"],time:"6:45am",ex:"Deadlift\nBarbell rows\nPull-ups\nFace pulls\nBicep curls\n+ 20 min Stairmaster"},
 {id:uid(),name:"Stretching & Mobility",days:["wed","sun"],time:"6:45am",ex:"Foam roll\nHip flexors\nPosterior chain\nShoulder mobility\nSpine mobility\n+ 40 min Stairmaster (HR 120–135)"},
 {id:uid(),name:"Upper Hypertrophy",days:["thu"],time:"6:50am",ex:"Cable work\nDB variations\nHigh volume upper body\n+ 20 min Stairmaster"},
 {id:uid(),name:"Full Body Compounds",days:["fri"],time:"6:45am",ex:"Power cleans\nFront squat\nWeighted pull-ups\nFarmers carries\n+ 20 min Stairmaster"},
 {id:uid(),name:"Legs",days:["sat"],time:"6:45am",ex:"Squat\nRomanian deadlift\nLeg press\nLunges\nCalf raises\n+ 20 min Stairmaster"},
 {id:uid(),name:"Swimming",days:["tue","thu"],time:"5:30pm",ex:"200m easy warm-up\n4x50m drills (catch-up, finger-drag, kick)\n8x100m main set (30s rest)\n4x25m all-out sprints\n200m cool-down\nTotal ~1,400–1,600m"},
 {id:uid(),name:"Rugby + Run",days:["mon","fri"],time:"5:30pm",ex:"Full rugby training\nThen 30–40 min outdoor run, easy pace (75 Hard)"},
 {id:uid(),name:"Rugby",days:["sat"],time:"5:30pm",ex:"Full rugby training session"},
]}

const DEFAULTS={
 targets:{cal:2100,protein:180,fiber:35,water:4000},
 schedule:null,routines:null,
 food:{},   // date -> [{id,name,cal,p,f}]
 water:{},  // date -> ml
 done:{},   // date -> {itemId:true}
 remindersOn:false
};
let DB;
function load(){
 try{DB=JSON.parse(localStorage.getItem("protocol_v1"))||null}catch(e){DB=null}
 if(!DB) DB=JSON.parse(JSON.stringify(DEFAULTS));
 if(!DB.schedule) DB.schedule=seedSchedule();
 if(!DB.routines) DB.routines=seedRoutines();
 save();
}
function save(){localStorage.setItem("protocol_v1",JSON.stringify(DB))}
const todayKey=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
const todayDay=()=>DAYS[new Date().getDay()];

/* time helpers */
function toMin(t){ // "6:45am" -> minutes
 const m=t.trim().toLowerCase().match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);if(!m)return 0;
 let h=+m[1];if(m[3]==="pm"&&h!==12)h+=12;if(m[3]==="am"&&h===12)h=0;return h*60+ +m[2];
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

/* ================= UI ================= */
let TAB="today", PLANDAY=todayDay();
const $=id=>document.getElementById(id);
function toast(msg){const t=$("toast");t.textContent=msg;t.style.display="block";clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",1600)}

const TABS=[["today","☀️","Today"],["food","🍽","Food"],["train","🏋️","Train"],["plan","📅","Plan"],["more","⚙️","More"]];
function renderNav(){
 $("nav").innerHTML=TABS.map(([k,i,l])=>`<button class="${TAB===k?'on':''}" onclick="go('${k}')"><span class="ico">${i}</span>${l}</button>`).join("");
}
function go(t){TAB=t;render();window.scrollTo(0,0)}

function render(){
 renderNav();
 const v={today:vToday,food:vFood,train:vTrain,plan:vPlan,more:vMore}[TAB];
 $("app").innerHTML=v();
}

/* ---------- Today ---------- */
function foodTotals(date){
 const list=DB.food[date]||[];
 return list.reduce((a,e)=>({cal:a.cal+(+e.cal||0),p:a.p+(+e.p||0),f:a.f+(+e.f||0)}),{cal:0,p:0,f:0});
}
function vToday(){
 const day=todayDay(),date=todayKey(),items=[...DB.schedule[day]].sort((a,b)=>toMin(a.time)-toMin(b.time));
 const done=DB.done[date]||{};
 const t=foodTotals(date),T=DB.targets,water=DB.water[date]||0;
 const nowMin=new Date().getHours()*60+new Date().getMinutes();
 let nextId=null;for(const x of items){if(!done[x.id]&&toMin(x.time)>=nowMin-30){nextId=x.id;break}}
 const bar=(v,max,color)=>`<div class="bar"><i style="width:${Math.min(100,v/max*100)}%;background:${color}"></i></div>`;
 const dn=new Date().toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
 const doneCount=items.filter(x=>done[x.id]).length;
 return `
  <h1>${DAYNAMES[day]}</h1><div class="sub">${dn} · ${doneCount}/${items.length} complete</div>
  <div class="row" style="margin:12px 0 8px">
    <div class="stat"><div class="lbl">Calories</div><b>${t.cal}</b> <span class="sub">/ ${T.cal}</span>${bar(t.cal,T.cal,"var(--accent)")}</div>
    <div class="stat"><div class="lbl">Protein</div><b>${t.p}g</b> <span class="sub">/ ${T.protein}</span>${bar(t.p,T.protein,"var(--green)")}</div>
  </div>
  <div class="row" style="margin-bottom:8px">
    <div class="stat"><div class="lbl">Fiber</div><b>${t.f}g</b> <span class="sub">/ ${T.fiber}</span>${bar(t.f,T.fiber,"var(--amber)")}</div>
    <div class="stat"><div class="lbl">Water</div><b>${(water/1000).toFixed(1)}L</b> <span class="sub">/ ${(T.water/1000).toFixed(0)}L</span>${bar(water,T.water,"#60a5fa")}
    <div class="water-btns" style="margin-top:8px"><button onclick="addWater(250)">+250ml</button><button onclick="addWater(500)">+500ml</button></div></div>
  </div>
  <h2>Schedule</h2>
  <div class="card" style="padding:6px 10px">
   ${items.map(x=>`
    <div class="tl-item ${done[x.id]?'done':''} ${x.id===nextId?'now':''}" onclick="toggleDone('${x.id}')">
      <div class="time">${esc(x.time)}</div>
      <div class="what">${esc(x.what)}${x.tag?` <span class="tag ${x.tag}">${x.tag==='wo'?'workout':x.tag==='hard'?'75 hard':'food'}</span>`:''}
        ${x.note?`<div class="note">${esc(x.note)}</div>`:''}</div>
      <div class="chk">✓</div>
    </div>`).join("")}
  </div>`;
}
function toggleDone(id){const d=todayKey();DB.done[d]=DB.done[d]||{};DB.done[d][id]=!DB.done[d][id];save();render()}
function addWater(ml){const d=todayKey();DB.water[d]=(DB.water[d]||0)+ml;save();render();toast("+"+ml+"ml")}

/* ---------- Food ---------- */
const QUICK=[["Meal 1",900,70,15],["Pre-WO Snack",300,30,5],["Meal 2",900,80,15]];
function vFood(){
 const date=todayKey(),list=DB.food[date]||[],t=foodTotals(date),T=DB.targets;
 const rem=T.cal-t.cal;
 return `
  <h1>Calorie Tracker</h1>
  <div class="sub">Eating window 12:00pm – 8:00pm</div>
  <div class="card" style="margin-top:12px;text-align:center">
    <div class="lbl" style="color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.5px">Remaining today</div>
    <div style="font-size:38px;font-weight:800;color:${rem<0?'var(--red)':'var(--accent)'}">${rem}</div>
    <div class="sub">${t.cal} eaten · ${t.p}g protein / ${T.protein}g · ${t.f}g fiber / ${T.fiber}g</div>
    <div class="bar" style="margin-top:10px"><i style="width:${Math.min(100,t.cal/T.cal*100)}%;background:${rem<0?'var(--red)':'var(--accent)'}"></i></div>
  </div>
  <h2>Quick add (plan meals)</h2>
  <div class="qbtns">${QUICK.map((q,i)=>`<button onclick="quickAdd(${i})"><b>${q[0]}</b><span>${q[1]} cal · ${q[2]}g P</span></button>`).join("")}</div>
  <h2>Custom entry</h2>
  <div class="card">
   <input id="fname" placeholder="Food name">
   <div class="mrow" style="margin-top:8px">
     <div><input id="fcal" type="number" inputmode="numeric" placeholder="Calories"></div>
     <div><input id="fp" type="number" inputmode="numeric" placeholder="Protein g"></div>
     <div><input id="ff" type="number" inputmode="numeric" placeholder="Fiber g"></div>
   </div>
   <button class="btn primary" style="width:100%;margin-top:10px" onclick="addFood()">Add food</button>
  </div>
  <h2>Today's log</h2>
  <div class="card" style="padding:6px 12px">
   ${list.length?list.map(e=>`
     <div class="entry"><div class="grow"><div>${esc(e.name)}</div><div class="macros">${e.cal} cal · ${e.p||0}g P · ${e.f||0}g fiber</div></div>
     <button class="btn small danger" onclick="delFood('${e.id}')">✕</button></div>`).join("")
    :`<div class="empty">Nothing logged yet</div>`}
  </div>
  <h2>Last 7 days</h2>
  <div class="card" style="padding:8px 12px">${history7()}</div>`;
}
function history7(){
 let out="";
 for(let i=0;i<7;i++){
  const d=new Date();d.setDate(d.getDate()-i);
  const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const t=foodTotals(k);const lbl=i===0?"Today":d.toLocaleDateString(undefined,{weekday:"short"});
  const pct=Math.min(100,t.cal/DB.targets.cal*100);
  const over=t.cal>DB.targets.cal;
  out+=`<div class="row" style="padding:5px 0"><div style="width:52px;font-size:12px;color:var(--dim);font-weight:600">${lbl}</div>
   <div class="grow"><div class="bar" style="margin:0"><i style="width:${pct}%;background:${over?'var(--red)':'var(--green)'}"></i></div></div>
   <div class="pill-count">${t.cal}</div></div>`;
 }
 return out;
}
function quickAdd(i){const q=QUICK[i];pushFood({name:q[0],cal:q[1],p:q[2],f:q[3]});toast(q[0]+" added")}
function addFood(){
 const name=$("fname").value.trim(),cal=+$("fcal").value;
 if(!name||!cal){toast("Name + calories needed");return}
 pushFood({name,cal,p:+$("fp").value||0,f:+$("ff").value||0});toast("Added");
}
function pushFood(e){const d=todayKey();DB.food[d]=DB.food[d]||[];DB.food[d].push({id:uid(),...e});save();render()}
function delFood(id){const d=todayKey();DB.food[d]=(DB.food[d]||[]).filter(x=>x.id!==id);save();render()}

/* ---------- Train (routines) ---------- */
function vTrain(){
 return `
  <div class="row"><h1 class="grow">Workout Routines</h1>
   <button class="btn primary" onclick="editRoutine(null)">+ Add</button></div>
  <div class="sub" style="margin-bottom:12px">Tap a routine to edit or delete it</div>
  ${DB.routines.map(r=>`
   <div class="routine" onclick="editRoutine('${r.id}')">
     <h3>${esc(r.name)}</h3>
     <div class="meta">${r.days.map(d=>DAYNAMES[d].slice(0,3)).join(" · ")} · ${esc(r.time)}</div>
     <div class="ex">${esc(r.ex)}</div>
   </div>`).join("")||`<div class="empty">No routines — add one</div>`}`;
}
function editRoutine(id){
 const r=id?DB.routines.find(x=>x.id===id):{name:"",days:[],time:"5:30pm",ex:""};
 openSheet(`
  <h3>${id?"Edit":"New"} routine</h3>
  <label>Name</label><input id="rname" value="${esc(r.name)}" placeholder="e.g. Push day">
  <label>Time</label><input id="rtime" value="${esc(r.time)}" placeholder="6:45am">
  <label>Days</label>
  <div class="days" id="rdays">${DAYS.map(d=>`<button data-d="${d}" class="${r.days.includes(d)?'on':''}" onclick="this.classList.toggle('on')">${DAYNAMES[d].slice(0,3)}</button>`).join("")}</div>
  <label>Exercises (one per line)</label><textarea id="rex" rows="6">${esc(r.ex)}</textarea>
  <div class="row" style="margin-top:14px">
    ${id?`<button class="btn danger" onclick="delRoutine('${id}')">Delete</button>`:""}
    <div class="grow"></div>
    <button class="btn" onclick="closeSheet()">Cancel</button>
    <button class="btn primary" onclick="saveRoutine('${id||""}')">Save</button>
  </div>`);
}
function saveRoutine(id){
 const name=$("rname").value.trim();if(!name){toast("Name required");return}
 const days=[...document.querySelectorAll("#rdays button.on")].map(b=>b.dataset.d);
 const data={name,time:$("rtime").value.trim()||"5:30pm",days,ex:$("rex").value};
 if(id){Object.assign(DB.routines.find(x=>x.id===id),data)}else{DB.routines.push({id:uid(),...data})}
 save();closeSheet();render();toast("Saved");
}
function delRoutine(id){DB.routines=DB.routines.filter(x=>x.id!==id);save();closeSheet();render();toast("Deleted")}

/* ---------- Plan (schedule editor) ---------- */
function vPlan(){
 const items=[...DB.schedule[PLANDAY]].sort((a,b)=>toMin(a.time)-toMin(b.time));
 return `
  <div class="row"><h1 class="grow">Weekly Plan</h1>
   <button class="btn primary" onclick="editItem(null)">+ Add</button></div>
  <div class="sub" style="margin-bottom:10px">Tap an item to edit · 🔔 = included in reminders export</div>
  <div class="days">${DAYS.map(d=>`<button class="${PLANDAY===d?'on':''}" onclick="PLANDAY='${d}';render()">${DAYNAMES[d].slice(0,3)}</button>`).join("")}</div>
  <div class="card" style="padding:6px 10px">
   ${items.map(x=>`
    <div class="tl-item" onclick="editItem('${x.id}')">
      <div class="time">${esc(x.time)}</div>
      <div class="what">${esc(x.what)} ${x.remind?"🔔":""}${x.note?`<div class="note">${esc(x.note)}</div>`:''}</div>
    </div>`).join("")||`<div class="empty">No items</div>`}
  </div>`;
}
function editItem(id){
 const x=id?DB.schedule[PLANDAY].find(i=>i.id===id):{time:"7:00am",what:"",note:"",tag:"",remind:false};
 openSheet(`
  <h3>${id?"Edit":"New"} — ${DAYNAMES[PLANDAY]}</h3>
  <label>Time (e.g. 6:45am)</label><input id="itime" value="${esc(x.time)}">
  <label>Activity</label><input id="iwhat" value="${esc(x.what)}">
  <label>Notes</label><input id="inote" value="${esc(x.note)}">
  <label>Type</label>
  <select id="itag">
    <option value="" ${!x.tag?"selected":""}>General</option>
    <option value="wo" ${x.tag==="wo"?"selected":""}>Workout</option>
    <option value="food" ${x.tag==="food"?"selected":""}>Food</option>
    <option value="hard" ${x.tag==="hard"?"selected":""}>75 Hard</option>
  </select>
  <label class="row" style="margin-top:12px;align-items:center;font-size:14px;color:var(--text)">
    <input type="checkbox" id="iremind" style="width:22px;height:22px" ${x.remind?"checked":""}> Include in iPhone reminders
  </label>
  <div class="row" style="margin-top:14px">
    ${id?`<button class="btn danger" onclick="delItem('${id}')">Delete</button>`:""}
    <div class="grow"></div>
    <button class="btn" onclick="closeSheet()">Cancel</button>
    <button class="btn primary" onclick="saveItem('${id||""}')">Save</button>
  </div>`);
}
function saveItem(id){
 const what=$("iwhat").value.trim();if(!what){toast("Activity required");return}
 const data={time:$("itime").value.trim()||"7:00am",what,note:$("inote").value.trim(),tag:$("itag").value,remind:$("iremind").checked};
 if(id){Object.assign(DB.schedule[PLANDAY].find(i=>i.id===id),data)}
 else{DB.schedule[PLANDAY].push({id:uid(),...data})}
 save();closeSheet();render();toast("Saved");
}
function delItem(id){DB.schedule[PLANDAY]=DB.schedule[PLANDAY].filter(i=>i.id!==id);save();closeSheet();render();toast("Deleted")}

}
function saveTargets(){
 DB.targets={cal:+$("tcal").value||2100,protein:+$("tp").value||180,fiber:+$("tf").value||35,water:+$("tw").value||4000};
 save();toast("Targets saved");render();
}
function exportData(){
 const blob=new Blob([JSON.stringify(DB,null,1)],{type:"application/json"});
 dl(blob,"protocol-backup.json");
}
function dl(blob,name){
 const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;
 document.body.appendChild(a);a.click();a.remove();
}

/* ---------- ICS export ---------- */
const BYDAY={sun:"SU",mon:"MO",tue:"TU",wed:"WE",thu:"TH",fri:"FR",sat:"SA"};
function downloadICS(){
 const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Protocol//EN","CALSCALE:GREGORIAN","X-WR-CALNAME:Protocol"];
 const now=new Date();
 for(const day of DAYS){
  for(const x of DB.schedule[day]){
   if(!x.remind)continue;
   const m=toMin(x.time);
   // next occurrence of this weekday
   const d=new Date(now);
   const target=DAYS.indexOf(day);
   let diff=(target-d.getDay()+7)%7;
   const hh=Math.floor(m/60),mm=m%60;
   if(diff===0&&(hh*60+mm)<=(d.getHours()*60+d.getMinutes()))diff=7;
   d.setDate(d.getDate()+diff);
   const ds=d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
   const ts="T"+String(hh).padStart(2,"0")+String(mm).padStart(2,"0")+"00";
   const de=new Date(d);de.setHours(hh,mm+15);
   const dse=de.getFullYear()+String(de.getMonth()+1).padStart(2,"0")+String(de.getDate()).padStart(2,"0");
   const tse="T"+String(de.getHours()).padStart(2,"0")+String(de.getMinutes()).padStart(2,"0")+"00";
   const escI=s=>(s||"").replace(/\\/g,"\\\\").replace(/,/g,"\\,").replace(/;/g,"\\;");
   lines.push("BEGIN:VEVENT",
    "UID:"+x.id+"-"+day+"@protocol.local",
    "DTSTART:"+ds+ts,
    "DTEND:"+dse+tse,
    "RRULE:FREQ=WEEKLY;BYDAY="+BYDAY[day],
    "SUMMARY:"+escI(x.what),
    x.note?"DESCRIPTION:"+escI(x.note):"",
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+escI(x.what),"TRIGGER:-PT0M","END:VALARM",
    "END:VEVENT");
  }
 }
 lines.push("END:VCALENDAR");
 const blob=new Blob([lines.filter(Boolean).join("\r\n")],{type:"text/calendar"});
 dl(blob,"protocol-reminders.ics");
 toast("Calendar file downloaded");
}

/* ---------- in-app notifications ---------- */
function enableNotifs(){
 if(!("Notification" in window)){toast("Not supported in this browser");return}
 Notification.requestPermission().then(p=>{DB.remindersOn=(p==="granted");save();render();toast(p==="granted"?"Notifications on":"Permission: "+p)});
}
let lastFired={};
setInterval(()=>{
 if(!DB||!DB.remindersOn||!("Notification"in window)||Notification.permission!=="granted")return;
 const day=todayDay(),nowM=new Date().getHours()*60+new Date().getMinutes();
 for(const x of DB.schedule[day]){
  if(!x.remind)continue;
  if(toMin(x.time)===nowM&&lastFired[x.id]!==todayKey()+nowM){
   lastFired[x.id]=todayKey()+nowM;
   try{new Notification("⏰ "+x.time,{body:x.what+(x.note?" — "+x.note:"")})}catch(e){}
  }
 }
},20000);

function openSheet(html){$("sheet").innerHTML=html;$("modal").classList.add("open")}
function closeSheet(){$("modal").classList.remove("open")}
$("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeSheet()});

/* ---------- boot ---------- */
load();render();
setInterval(()=>{if(TAB==="today")render()},60000);
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{})}
