<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Protocol</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protocol">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  --bg:#0b1220; --card:#131c2e; --card2:#1a2540; --line:#233150;
  --text:#e8eefc; --dim:#8b9ac2; --accent:#38bdf8; --green:#34d399;
  --amber:#fbbf24; --red:#f87171; --purple:#a78bfa;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
  padding-top:var(--safe-top);overscroll-behavior-y:none;-webkit-user-select:none;user-select:none}
#app{max-width:560px;margin:0 auto;padding:12px 14px calc(88px + var(--safe-bottom))}
h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
h2{font-size:15px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px}
.sub{color:var(--dim);font-size:13px;margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1}
button{font-family:inherit;border:none;border-radius:12px;cursor:pointer;font-weight:600}
.btn{background:var(--card2);color:var(--text);padding:10px 14px;font-size:14px;border:1px solid var(--line)}
.btn.primary{background:var(--accent);color:#03121f;border:none}
.btn.green{background:var(--green);color:#052e1b;border:none}
.btn.danger{color:var(--red)}
.btn.small{padding:6px 10px;font-size:12px;border-radius:9px}
.btn:active{opacity:.7}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,18,32,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:8px 4px calc(8px + var(--safe-bottom));z-index:50}
nav button{background:none;color:var(--dim);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 7px}
nav button.on{color:var(--accent)}
nav .ico{font-size:19px;line-height:1}
.bar{height:8px;background:var(--card2);border-radius:6px;overflow:hidden;margin-top:5px}
.bar>i{display:block;height:100%;border-radius:6px;transition:width .35s}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 12px}
.stat b{font-size:17px}
.stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.tl-item{display:flex;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line);align-items:flex-start}
.tl-item:last-child{border-bottom:none}
.tl-item .time{width:64px;flex-shrink:0;font-size:12px;font-weight:700;color:var(--dim);padding-top:3px;font-variant-numeric:tabular-nums}
.tl-item .what{flex:1;font-size:14px;font-weight:600}
.tl-item .note{font-size:12px;color:var(--dim);font-weight:400;margin-top:2px}
.tl-item.done .what{color:var(--dim);text-decoration:line-through}
.tl-item.now{background:linear-gradient(90deg,rgba(56,189,248,.12),transparent);border-radius:10px}
.tl-item.now .time{color:var(--accent)}
.chk{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:14px;background:var(--card2)}
.tl-item.done .chk{background:var(--green);border-color:var(--green);color:#052e1b}
.tl-item.editing{background:rgba(56,189,248,.06);border-radius:10px}
.chk.edit{background:var(--card2);border-color:var(--accent);color:var(--accent)}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--card2);color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.tag.wo{background:rgba(167,139,250,.15);color:var(--purple)}
.tag.food{background:rgba(52,211,153,.15);color:var(--green)}
.tag.hard{background:rgba(251,191,36,.15);color:var(--amber)}
.entry{display:flex;align-items:center;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px}
.entry:last-child{border-bottom:none}
.entry .macros{font-size:12px;color:var(--dim)}
.qbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.qbtns button{background:var(--card);border:1px solid var(--line);color:var(--text);padding:10px 6px;border-radius:14px;font-size:12px;line-height:1.35}
.qbtns b{display:block;font-size:13px}
.qbtns span{color:var(--dim);font-size:11px}
input,textarea,select{font-family:inherit;background:var(--card2);border:1px solid var(--line);color:var(--text);
  border-radius:11px;padding:11px 12px;font-size:16px;width:100%;-webkit-user-select:text;user-select:text}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
label{font-size:12px;color:var(--dim);font-weight:600;display:block;margin:10px 0 4px}
.days{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
.days button{flex-shrink:0;background:var(--card);border:1px solid var(--line);color:var(--dim);padding:8px 13px;border-radius:20px;font-size:13px}
.days button.on{background:var(--accent);color:#03121f;border-color:var(--accent);font-weight:700}
.routine{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.routine h3{font-size:15px}
.routine .meta{font-size:12px;color:var(--accent);font-weight:600;margin:2px 0 6px}
.routine .ex{font-size:13px;color:var(--dim);line-height:1.55}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;justify-content:center}
#modal.open{display:flex}
#modal .sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:18px 16px calc(20px + var(--safe-bottom));max-height:85vh;overflow-y:auto}
#modal h3{font-size:17px;margin-bottom:4px}
.mrow{display:flex;gap:8px}
.mrow>div{flex:1}
.water-btns{display:flex;gap:8px}
.water-btns button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--accent);padding:9px 4px;border-radius:11px;font-size:13px}
.toast{position:fixed;top:calc(var(--safe-top) + 10px);left:50%;transform:translateX(-50%);background:var(--green);color:#052e1b;
  padding:10px 18px;border-radius:24px;font-weight:700;font-size:14px;z-index:200;display:none;max-width:88vw;text-align:center}
.toast.warn{background:var(--amber);color:#3b2a03}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:16px 0}
.pill-count{background:var(--card2);border-radius:9px;padding:2px 8px;font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
/* owala bottles */
.owalas{display:flex;gap:10px;margin:10px 0 12px;justify-content:center}
.bottle{width:34px;height:58px;border:2px solid var(--line);border-radius:10px 10px 12px 12px;position:relative;overflow:hidden;background:var(--card2)}
.bottle:before{content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:14px;height:8px;border:2px solid var(--line);border-bottom:none;border-radius:5px 5px 0 0}
.bottle .fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#60a5fa,#38bdf8);transition:height .35s}
.bottle.full{border-color:#60a5fa}
/* gym mode */
.gym-ex{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
.gym-ex h3{font-size:17px}
.gym-ex .target{font-size:13px;color:var(--purple);font-weight:700;margin:2px 0}
.gym-ex .last{font-size:12px;color:var(--dim);margin-bottom:8px}
.set-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.set-row .setn{width:44px;font-size:13px;font-weight:700;color:var(--dim)}
.set-row input{padding:12px 10px;font-size:18px;font-weight:700;text-align:center}
.set-row .x{color:var(--dim);font-size:14px}
.set-row .unit{font-size:12px;color:var(--dim);width:22px}
.gym-head{position:sticky;top:0;background:var(--bg);padding:8px 0 10px;z-index:5}
/* notebook */
.spark{width:100%;height:90px;display:block}
.logcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-bottom:8px}
.logcard h3{font-size:14px}
.logcard .sub{font-size:12px}
.seg{display:flex;background:var(--card2);border-radius:12px;padding:3px;margin-bottom:12px}
.seg button{flex:1;background:none;color:var(--dim);padding:9px;font-size:13px;border-radius:10px}
.seg button.on{background:var(--card);color:var(--text)}
.caff-cut{font-size:12px;font-weight:700;margin-top:8px}
/* history calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal .wd{font-size:10px;color:var(--dim);text-align:center;font-weight:700;text-transform:uppercase;padding-bottom:2px}
.cal .day{aspect-ratio:1;border-radius:9px;background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--dim);border:1.5px solid transparent}
.cal .day.g4{background:rgba(52,211,153,.25);color:var(--green);border-color:rgba(52,211,153,.6)}
.cal .day.g2{background:rgba(251,191,36,.16);color:var(--amber)}
.cal .day.g0{background:rgba(248,113,113,.14);color:var(--red)}
.cal .day.today{border-color:var(--accent)}
.cal .day.future,.cal .day.blank{opacity:.22;background:transparent}
.legend{display:flex;gap:12px;justify-content:center;margin-top:10px;font-size:11px;color:var(--dim)}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px}
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.mnav button{background:var(--card2);border:1px solid var(--line);color:var(--text);width:36px;height:36px;border-radius:10px;font-size:16px}
.mnav .mtitle{flex:1;text-align:center;font-weight:800;font-size:16px}
.arow{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px}
.arow:last-child{border-bottom:none}
.objline{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:14px}
.objline .mark{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.objline .mark.ok{background:rgba(52,211,153,.2);color:var(--green)}
.objline .mark.no{background:rgba(248,113,113,.15);color:var(--red)}
/* motivation */
.hero-img{width:100%;border-radius:18px;display:block;object-fit:cover;max-height:60vh;background:var(--card2)}
.upload-btn{position:relative;overflow:hidden;display:inline-block}
.upload-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.thumb{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--card2)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:8px;background:rgba(11,18,32,.75);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav"></nav>
<div id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ================= DATA ================= */
const uid=()=>Math.random().toString(36).slice(2,9);
const OWALA=32, CAFF_LIMIT_DEFAULT=400, CAFF_CUTOFF=14*60; // 2:00pm

/* ---------- 8-Week Rugby/CrossFit program (Jul 14 – Sep 7, 2026) ---------- */
const E=(name,sets,reps)=>({name,sets,reps});
function wo(time,title,note,exercises){return{time,title,tag:"wo",note:note||"",exercises:exercises||[]}}
function test(time,title,note,exercises){return{time,title,tag:"hard",note:note||"",exercises:exercises||[]}}
function upperA(phase){
 if(phase==="taper")return[E("Flat Barbell Bench Press",3,"8"),E("Seated DB Shoulder Press",2,"10"),E("Incline DB Bench Press",2,"10"),E("Lat Pulldown",2,"10"),E("Face Pulls",2,"15")];
 if(phase==="p2")return[E("Flat Barbell Bench Press",4,"6-8"),E("Seated DB Shoulder Press",3,"8-10"),E("Incline DB Bench Press",3,"8-10"),E("Lat Pulldown",3,"10"),E("Cable Lateral Raise",3,"15"),E("Rear Delt Fly",3,"15"),E("Triceps Rope Pushdown",3,"12"),E("Face Pulls",2,"15")];
 return[E("Flat Barbell Bench Press",4,"8-10"),E("Seated DB Shoulder Press",3,"10-12"),E("Incline DB Bench Press",3,"10-12"),E("Lat Pulldown",3,"10-12"),E("Cable Lateral Raise",3,"15"),E("Rear Delt Fly",3,"15"),E("Triceps Rope Pushdown",3,"12-15"),E("Face Pulls",2,"15")];
}
function upperB(phase){
 if(phase==="taper")return[E("Weighted Pull-ups",3,"8"),E("Barbell Bent-Over Row",3,"8"),E("Seated Cable Row",2,"10"),E("Single-Arm DB Row",2,"10/side"),E("Arnold Press",2,"10"),E("Barbell Curl",2,"10")];
 if(phase==="p2")return[E("Weighted Pull-ups",4,"6-8"),E("Barbell Bent-Over Row",4,"6-8"),E("Seated Cable Row",3,"10"),E("Single-Arm DB Row",3,"10/side"),E("DB Shrugs",3,"12"),E("Arnold Press",3,"10"),E("Barbell Curl",3,"10"),E("Hammer Curl",2,"12")];
 return[E("Weighted Pull-ups",4,"8-10"),E("Barbell Bent-Over Row",4,"8-10"),E("Seated Cable Row",3,"10-12"),E("Single-Arm DB Row",3,"10-12/side"),E("DB Shrugs",3,"12-15"),E("Arnold Press",3,"10-12"),E("Barbell Curl",3,"10-12"),E("Hammer Curl",2,"12-15")];
}
const PROGRAM_START=new Date(2026,6,14); // Jul 14 2026 (Tuesday)
const PROGRAM_END=new Date(2026,8,7);    // Sep 7 2026
const CYCLE=["tue","wed","thu","fri","sat","sun","mon"]; // program week runs Tue→Mon
const PHASE_LABEL=["Phase 1 — Rebuild","Phase 1 — Rebuild","Phase 1 — Rebuild","Phase 1 — Rebuild (Benchmark)","Phase 2 — Explosive Power","Phase 2 — Explosive Power","Phase 2 — Explosive Power (Peak)","Phase 2 — Taper"];

const WEEKS=[
 { // Week 1
  tue:[wo("7:00am","AM Pitch","Falling Starts 5×10m · Scrum Starts 5×10m · A-Skips 3×20m\nCF Finisher \"Engine Builder\" (AMRAP 12): 10 cal Assault Bike, 10 KB Swings (53/35), 10 Box Step-Ups, 10 Push-ups"),
      wo("5:15pm","PM Gym — Clean Day","Light (~40%) — focus on bar speed and clean positions",[E("Hang Power Clean",5,"10"),E("Clean Pull",3,"10"),E("Front Rack Carry",3,"20m")])],
  wed:[wo("7:00am","AM Tempo Run","15–20 min continuous, tempo pace (comfortably hard)"),
      wo("5:15pm","PM CrossFit Strength + WOD","Ring Rows 3×10 / Box Jumps 3×8\nWOD — \"First Grind\" (For Time, cap 15 min): 21-15-9 KB Swings + Assault Bike Cal, then 400m run",[E("Back Squat",4,"6"),E("Push Press",3,"6")])],
  thu:[wo("7:00am","AM Pitch","100m Tempo Strides 8×75% · Plank 3×45–60s"),
      wo("5:15pm","PM Gym — Squat/RDL Day","Week 1 baseline — pick a weight you could do for 20+ reps if pushed",[E("Back Squat",4,"12"),E("Romanian Deadlift",4,"12"),E("Walking Lunge",2,"12 steps")])],
  fri:[wo("7:00am","Upper Body B (Pull/Back) + Bike/Swim","Bike or swim, easy: 20–25 min",upperB("p1"))],
  sat:[wo("7:00am","Long, Slow Run","30 min continuous, easy conversational pace (zone 2)"),
      wo("7:50am","AM Pitch","Pro Agility Shuttle 3 reps · Sled/Partner Push 4×15m · Lateral A-Skips 2×20m (times estimated)"),
      wo("8:35am","PM Gym (Heavy)","Finisher — 10-min EMOM: 3 Burpees + 5 KB Swings",[E("Hex Bar Deadlift",4,"8"),E("Barbell Bench Press",4,"8"),E("Heavy Pendlay Row",4,"8"),E("Snatch-Grip Shrugs",3,"12"),E("Farmer's Carries",3,"40m")])],
  sun:[wo("7:00am","AM Pitch","\"Tackle-to-Feet\" ruck simulator: drop-pop-sprint 10m-jog 10m ×4 = 1 set, 3 sets, rest 2.5 min\nBronco (light, 80% effort): 3 rounds (20/40/60m out-and-back)"),
      wo("5:15pm","PM Gym (Heaviest)","Finisher — \"Sunday Grinder\" AMRAP 10: 5 Cal Row, 10 Air Squats, 5 Push Press (empty bar)",[E("Front Squat",3,"6"),E("Standing OHP",3,"8"),E("Chest-Supported Row",3,"10"),E("Pallof Press",3,"12/side")])],
  mon:[wo("7:00am","Upper Body A (Push/Chest) + Bike/Swim","Bike or swim, easy: 20–25 min",upperA("p1"))],
 },
 { // Week 2
  tue:[wo("7:00am","AM Pitch","Falling Starts 5×10m (90%) · Scrum Starts 5×10m · A-Skips 3×20m\nCF Finisher \"Engine Builder v2\" (AMRAP 13): 12 cal Bike, 10 KB Swings, 10 Box Step-Ups, 12 Push-ups"),
      wo("5:15pm","PM Gym — Clean Day","Light — hold Week 1 load, focus on bar speed",[E("Hang Power Clean",5,"10"),E("Clean Pull",3,"10"),E("Front Rack Carry",3,"20m")])],
  wed:[wo("7:00am","AM Tempo Run","20 min continuous, tempo pace"),
      wo("5:15pm","PM CrossFit Strength + WOD","Ring Rows 3×10 / Box Jumps 3×8\nWOD — \"Grinder\" (For Time, cap 16 min): 800m run, then 21-15-9 Thrusters (empty bar/light) + Burpees",[E("Back Squat",4,"6"),E("Push Press",3,"6")])],
  thu:[wo("7:00am","AM Pitch","100m Tempo Strides 9×75% · Plank 3×60s"),
      wo("5:15pm","PM Gym — Squat/RDL Day","+5–10 lb from Week 1",[E("Back Squat",4,"12"),E("Romanian Deadlift",4,"12"),E("Walking Lunge",2,"14 steps")])],
  fri:[wo("7:00am","Upper Body B (Pull/Back) + Bike/Swim","Bike or swim, easy: 25 min",upperB("p1"))],
  sat:[wo("7:00am","Long, Slow Run","35 min continuous, easy pace"),
      wo("7:55am","AM Pitch","Pro Agility Shuttle 4 reps · Sled/Partner Push 5×15m · Lateral A-Skips 3×20m (times estimated)"),
      wo("8:40am","PM Gym (Heavy)","Finisher — 12-min EMOM: 4 Burpees + 6 KB Swings",[E("Hex Bar Deadlift",4,"8"),E("Barbell Bench Press",4,"8"),E("Heavy Pendlay Row",4,"8"),E("Snatch-Grip Shrugs",3,"12"),E("Farmer's Carries",3,"40m")])],
  sun:[wo("7:00am","AM Pitch","Ruck simulator: 4 sets, rest 2.5 min\nBronco (85% effort): 4 rounds"),
      wo("5:15pm","PM Gym (Heaviest)","Finisher — \"Sunday Grinder v2\" AMRAP 11: 6 Cal Row, 10 Air Squats, 6 Push Press",[E("Front Squat",3,"6"),E("Standing OHP",3,"8"),E("Chest-Supported Row",3,"10"),E("Pallof Press",3,"12/side")])],
  mon:[wo("7:00am","Upper Body A (Push/Chest) + Bike/Swim","Bike or swim, easy: 25 min",upperA("p1"))],
 },
 { // Week 3
  tue:[wo("7:00am","AM Pitch","Falling Starts 5×10m (95%) · Scrum Starts 6×10m · A-Skips 3×20m\nCF Finisher \"Ladder\" (12 min): 1-2-3...up the ladder — Assault Bike Cal + Burpees, add 1 rep each round"),
      wo("5:15pm","PM Gym — Clean Day","Light — bar speed over load",[E("Hang Power Clean",5,"10"),E("Clean Pull",3,"10"),E("Front Rack Carry",3,"20m")])],
  wed:[wo("7:00am","AM Tempo Run","20–22 min continuous, tempo pace"),
      wo("5:15pm","PM CrossFit Strength + WOD","Ring Rows 3×10 / Box Jumps 3×10\nWOD — \"Midweek Chipper\" (For Time, cap 18 min): 50 Wall Balls, 40 KB Swings, 30 Box Step-Ups, 20 Push Press, 10 Burpees",[E("Back Squat",4,"5"),E("Push Press",3,"5")])],
  thu:[wo("7:00am","AM Pitch","100m Tempo Strides 10×75% · Plank 3×60s"),
      wo("5:15pm","PM Gym — Squat/RDL Day","+5–10 lb from Week 2",[E("Back Squat",4,"12"),E("Romanian Deadlift",4,"12"),E("Walking Lunge",2,"14 steps")])],
  fri:[wo("7:00am","Upper Body B (Pull/Back) + Bike/Swim","Bike or swim, easy: 25–30 min",upperB("p1"))],
  sat:[wo("7:00am","Long, Slow Run","40 min continuous, easy pace"),
      wo("8:00am","AM Pitch","Pro Agility Shuttle 4 reps · Sled/Partner Push 5×15m · Lateral A-Skips 3×20m (times estimated)"),
      wo("8:45am","PM Gym (Heavy)","Finisher — 12-min EMOM: 5 Burpees + 6 KB Swings",[E("Hex Bar Deadlift",4,"6"),E("Barbell Bench Press",4,"6"),E("Heavy Pendlay Row",4,"8"),E("Snatch-Grip Shrugs",3,"12"),E("Farmer's Carries",3,"45m")])],
  sun:[wo("7:00am","AM Pitch","Ruck simulator: 4 sets, rest 2 min\nBronco (90% effort): 4 rounds"),
      wo("5:15pm","PM Gym (Heaviest)","Finisher — \"Sunday Grinder v3\" AMRAP 12: 7 Cal Row, 12 Air Squats, 7 Push Press",[E("Front Squat",3,"5"),E("Standing OHP",3,"6"),E("Chest-Supported Row",3,"10"),E("Pallof Press",3,"12/side")])],
  mon:[wo("7:00am","Upper Body A (Push/Chest) + Bike/Swim","Bike or swim, easy: 25–30 min",upperA("p1"))],

function it(time,what,note="",tag="",remind=false,exercises){return{id:uid(),time,what,note,tag,remind,exercises:exercises||[]}}
function stripTime(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function daysBetween(a,b){return Math.round((stripTime(b)-stripTime(a))/86400000)}
function programPosition(date){
 const diff=daysBetween(PROGRAM_START,date);
 const week=Math.max(0,Math.min(7,Math.floor(diff/7)));
 const cyclePos=((diff%7)+7)%7;
 return{week,cyclePos,cycleKey:CYCLE[cyclePos]};
}
function dateKeyOf(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function parseDateKey(k){const[y,m,d]=k.split("-").map(Number);return new Date(y,m-1,d)}
function buildDayItems(date){
 const{week,cycleKey}=programPosition(date);
 const sessions=WEEKS[week][cycleKey];
 const items=[];
 items.push(it("6:45am","Wake","Open shades · creatine, saw palmetto, omeprazole with water","",true));
 if(cycleKey==="sat"){
  for(const s of sessions)items.push(it(s.time,s.title,s.note,s.tag,true,s.exercises));
  items.push(it("6:30pm","Dinner","No eating after 8:00pm","",true));
 }else{
  items.push(it(sessions[0].time,sessions[0].title,sessions[0].note,sessions[0].tag,true,sessions[0].exercises));
  items.push(it("8:15am","Back from AM training","",""));
  items.push(it("9:15am","At work","",""));
  items.push(it("5:00pm","Home from work","",""));
  if(sessions[1])items.push(it(sessions[1].time,sessions[1].title,sessions[1].note,sessions[1].tag,true,sessions[1].exercises));
  items.push(it("8:00pm","EATING WINDOW CLOSES","No eating after 8:00pm","",true));
 }
 items.push(it("9:00pm","PM sleep supplements","Minoxidil + caffeine (hair) · make tomorrow's lunch","",true));
 items.push(it("10:00pm","Screens off","Reading until bed","",true));
 return items;
}
function getScheduleForDate(date){
 const key=dateKeyOf(date);
 if(!DB.schedule[key]){DB.schedule[key]=buildDayItems(date);save()}
 return DB.schedule[key];
}

const todayKey=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
const nowMin=()=>new Date().getHours()*60+new Date().getMinutes();
function toMin(t){
 const m=t.trim().toLowerCase().match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/);if(!m)return 0;
 let h=+m[1];if(m[3]==="pm"&&h!==12)h+=12;if(m[3]==="am"&&h===12)h=0;return h*60+ +m[2];
}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(k){const[y,m,d]=k.split("-");return new Date(+y,+m-1,+d).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})}
/* time format: app stores "6:45am"; native <input type=time> uses 24h "06:45" */
function to24(t){const m=toMin(t);return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0")}
function from24(s){if(!s||!/^\d{1,2}:\d{2}$/.test(s))return "";let[h,m]=s.split(":").map(Number);const ap=h<12?"am":"pm";const h12=h%12||12;return h12+":"+String(m).padStart(2,"0")+ap}

/* ---------- Gym mode ---------- */
function lastSetsForExercise(name){
 for(let i=DB.log.length-1;i>=0;i--){
  const e=DB.log[i].ex.find(x=>x.name===name);
  if(e)return e.sets;
 }
 return null;
}
function startGym(dateKey,itemId){
 closeSheet();
 const item=getScheduleForDate(parseDateKey(dateKey)).find(i=>i.id===itemId);
 if(!item||!item.exercises||!item.exercises.length)return;
 GYM={dateKey,itemId,name:item.what,note:item.note,data:item.exercises.map(e=>{
   const last=lastSetsForExercise(e.name);
   return {name:e.name,sets:e.sets,reps:e.reps,
     rows:Array.from({length:e.sets},(_,i)=>({
       w:last&&last[i]?last[i].w:"",
       r:"",
       lastW:last&&last[i]?last[i].w:"",
       lastR:last&&last[i]?last[i].r:""}))};
 })};
 go("gym");
}
function vGym(){
 if(!GYM){TAB="today";return vToday()}
 return `
  <div class="gym-head">
   <div class="row"><h1 class="grow">${esc(GYM.name)}</h1>
    <button class="btn small" onclick="if(confirm('Discard this workout?')){GYM=null;go('today')}">Cancel</button></div>
   <div class="sub">${new Date().toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})}</div>
   ${GYM.note?`<div class="sub" style="white-space:pre-line">${esc(GYM.note)}</div>`:''}
  </div>
  ${GYM.data.map((e,ei)=>{
    const hint=e.rows.some(s=>s.lastW||s.lastR)?`Last: ${e.rows.map(s=>s.lastW?`${s.lastW}×${s.lastR||"?"}`:"—").join(" · ")}`:"First time — set your baseline";
    return `<div class="gym-ex">
     <h3>${esc(e.name)}</h3>
     <div class="target">${e.sets} × ${esc(e.reps)}</div>
     <div class="last">${hint}</div>
     ${e.rows.map((s,si)=>`
      <div class="set-row">
        <div class="setn">Set ${si+1}</div>
        <input type="number" inputmode="decimal" placeholder="${s.lastW||'weight'}" value="${s.w!==""?s.w:""}" oninput="GYM.data[${ei}].rows[${si}].w=this.value">
        <div class="unit">lb</div><div class="x">×</div>
        <input type="number" inputmode="numeric" placeholder="${s.lastR||'reps'}" value="${s.r!==""?s.r:""}" oninput="GYM.data[${ei}].rows[${si}].r=this.value">
        <div class="unit">reps</div>
      </div>`).join("")}
    </div>`;}).join("")}
  <button class="btn green" style="width:100%;padding:16px;font-size:16px" onclick="finishGym()">Finish & log workout</button>`;
}
function finishGym(){
 const entry={id:uid(),date:GYM.dateKey,name:GYM.name,
   ex:GYM.data.map(e=>({name:e.name,sets:e.rows.filter(s=>s.w!==""||s.r!=="").map(s=>({w:+s.w||0,r:+s.r||0}))}))
     .filter(e=>e.sets.length)};
 if(!entry.ex.length){toast("Enter at least one set",true);return}
 DB.log.push(entry);
 if(GYM.itemId){DB.done[GYM.dateKey]=DB.done[GYM.dateKey]||{};DB.done[GYM.dateKey][GYM.itemId]=true}
 save();GYM=null;BOOKVIEW="history";go("book");toast("Workout logged");
}

function bookProgress(names){
 if(!names.length)return `<div class="empty">Log workouts to see progress charts</div>`;
 const sessions=DB.log.filter(l=>l.ex.some(e=>e.name===BOOKEX))
   .map(l=>({date:l.date,top:Math.max(...l.ex.find(e=>e.name===BOOKEX).sets.map(s=>s.w||0),0),
             sets:l.ex.find(e=>e.name===BOOKEX).sets}));
 const pr=sessions.length?Math.max(...sessions.map(s=>s.top)):0;
 return `
  <select onchange="BOOKEX=this.value;render()" style="margin-bottom:10px">
    ${names.map(n=>`<option ${n===BOOKEX?"selected":""}>${esc(n)}</option>`).join("")}
  </select>
  <div class="card">
    <div class="row"><div class="grow"><b style="font-size:16px">${esc(BOOKEX)}</b>
      <div class="sub">${sessions.length} session${sessions.length===1?"":"s"}</div></div>
      <div style="text-align:right"><div class="lbl" style="font-size:11px;color:var(--dim)">PR</div><b style="font-size:18px;color:var(--green)">${pr} lb</b></div></div>
    ${spark(sessions.map(s=>s.top))}
  </div>
  ${[...sessions].reverse().map(s=>`
   <div class="logcard"><div class="row"><div class="grow"><b style="font-size:13px">${fmtDate(s.date)}</b>
     <div class="sub">${s.sets.map(x=>`${x.w||0}×${x.r||0}`).join(" · ")}</div></div>
     <div class="pill-count" style="color:${s.top>=pr&&pr>0?'var(--green)':'var(--dim)'}">${s.top} lb</div></div></div>`).join("")}`;
}
function spark(vals){
 if(vals.length<2)return `<div class="empty" style="padding:10px 0">Log ${2-vals.length} more session${vals.length===1?"":"s"} to see the trend</div>`;
 const W=300,H=80,P=8;
 const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1;
 const pts=vals.map((v,i)=>`${P+i*(W-2*P)/(vals.length-1)},${H-P-(v-mn)/rg*(H-2*P)}`).join(" ");
 return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
   <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
   ${vals.map((v,i)=>`<circle cx="${P+i*(W-2*P)/(vals.length-1)}" cy="${H-P-(v-mn)/rg*(H-2*P)}" r="3.5" fill="${v>=mx?'var(--green)':'var(--accent)'}"/>`).join("")}
 </svg>`;
}

/* ---------- ICS export (dated events across the 8-week program) ---------- */
function downloadICS(){
 const lines=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Protocol//EN","CALSCALE:GREGORIAN","X-WR-CALNAME:Protocol"];
 const escI=s=>(s||"").replace(/\\/g,"\\\\").replace(/,/g,"\\,").replace(/;/g,"\\;");
 for(let d=new Date(PROGRAM_START);d<=PROGRAM_END;d.setDate(d.getDate()+1)){
  const items=getScheduleForDate(new Date(d));
  for(const x of items){
   if(!x.remind)continue;
   const m=toMin(x.time),hh=Math.floor(m/60),mm=m%60;
   const ds=d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
   const ts="T"+String(hh).padStart(2,"0")+String(mm).padStart(2,"0")+"00";
   const de=new Date(d);de.setHours(hh,mm+15);
   const dse=de.getFullYear()+String(de.getMonth()+1).padStart(2,"0")+String(de.getDate()).padStart(2,"0");
   const tse="T"+String(de.getHours()).padStart(2,"0")+String(de.getMinutes()).padStart(2,"0")+"00";
   lines.push("BEGIN:VEVENT",
    "UID:"+x.id+"@protocol.local",
    "DTSTART:"+ds+ts,
    "DTEND:"+dse+tse,
    "SUMMARY:"+escI(x.what),
    x.note?"DESCRIPTION:"+escI(x.note):"",
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+escI(x.what),"TRIGGER:-PT0M","END:VALARM",
    "END:VEVENT");
  }
 }
 lines.push("END:VCALENDAR");
 const blob=new Blob([lines.filter(Boolean).join("\r\n")],{type:"text/calendar"});
 dl(blob,"protocol-reminders.ics");
 toast("Calendar file downloaded — 8 weeks of reminders");
}

let HISTM=(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()}})();
function dayStats(key){

 const wos=DB.log.filter(l=>l.date===key);

 const T=DB.targets;
 const obj=[
  {ok:items.length>0&&checked/items.length>=0.8,label:"Schedule ≥ 80% done",detail:checked+" / "+items.length+" items"},
  {ok:t.cal>0&&t.cal<=T.cal*1.05,label:"Calories on target",detail:t.cal+" / "+T.cal+" cal"},

  {ok:hasData&&caff<=T.caffeine,label:"Caffeine under limit",detail:caff+" / "+T.caffeine+" mg"},
 ];
 return {key,wd,items,done,checked,t,oz,caff,wos,hasData,obj,hit:obj.filter(o=>o.ok).length};
}
function keyOffset(off){const d=new Date();d.setDate(d.getDate()-off);
 return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function vHist(){

function histAnalytics(){
 // last 30 days, only days with data
 const T=DB.targets;
 let daysData=0,perfect=0,checkedSum=0,itemSum=0;
 const miss={};
 for(let i=0;i<30;i++){
  const key=keyOffset(i);
  const s=dayStats(key);
  if(!s.hasData)continue;
  daysData++;if(s.hit===4)perfect++;
  checkedSum+=s.checked;itemSum+=s.items.length;
  for(const x of s.items){
   if(!s.done[x.id]){
    const k=x.what;
    miss[k]=miss[k]||{miss:0,total:0};
    miss[k].miss++;
   }
   (miss[x.what]=miss[x.what]||{miss:0,total:0}).total++;
  }
 }
 const missTop=Object.entries(miss).filter(([k,v])=>v.miss>0)
   .sort((a,b)=>b[1].miss-a[1].miss).slice(0,5);
 // workouts last 30d
 const cutoff=keyOffset(29);
 const wos=DB.log.filter(l=>l.date>=cutoff);
 const vol30=wos.reduce((a,l)=>a+volume(l),0);
 // progressive overload: per exercise first vs last top weight (all time, ≥2 sessions)
 const prog={};
 for(const l of DB.log)for(const e of l.ex){
  const top=Math.max(...e.sets.map(s=>s.w||0),0);
  if(top<=0)continue;
  (prog[e.name]=prog[e.name]||[]).push(top);
 }
 const gains=Object.entries(prog).filter(([n,v])=>v.length>=2)
  .map(([n,v])=>({n,first:v[0],last:v[v.length-1],pct:Math.round((v[v.length-1]-v[0])/v[0]*100)}))
  .sort((a,b)=>b.pct-a.pct);
 const adhere=itemSum?Math.round(checkedSum/itemSum*100):0;
 return `
  <h2>Last 30 days</h2>
  <div class="row" style="margin-bottom:8px">
    <div class="stat"><div class="lbl">Perfect days</div><b>${perfect}</b> <span class="sub">/ ${daysData} tracked</span></div>
    <div class="stat"><div class="lbl">Schedule adherence</div><b>${adhere}%</b></div>
  </div>
  <div class="row" style="margin-bottom:8px">
    <div class="stat"><div class="lbl">Workouts</div><b>${wos.length}</b> <span class="sub">(${(wos.length/30*7).toFixed(1)}/wk)</span></div>
    <div class="stat"><div class="lbl">Volume lifted</div><b>${Math.round(vol30).toLocaleString()}</b> <span class="sub">lb</span></div>
  </div>
  <h2>Most missed events</h2>
  <div class="card" style="padding:6px 12px">
   ${missTop.length?missTop.map(([k,v])=>`
    <div class="arow"><div class="grow">${esc(k)}</div>
      <div class="pill-count" style="color:var(--red)">missed ${v.miss}× / ${v.total}</div></div>`).join("")
    :'<div class="empty">Nothing missed — or nothing tracked yet</div>'}
  </div>
  <h2>Progressive overload</h2>
  <div class="card" style="padding:6px 12px">
   ${gains.length?gains.map(g=>`
    <div class="arow"><div class="grow">${esc(g.n)}</div>
      <div class="sub" style="margin:0">${g.first} → ${g.last} lb</div>
      <div class="pill-count" style="color:${g.pct>0?'var(--green)':g.pct<0?'var(--red)':'var(--dim)'}">${g.pct>0?"+":""}${g.pct}%</div></div>`).join("")
    :'<div class="empty">Log the same exercise twice to see gains</div>'}
  </div>`;
}

/* ---------- motivation images (IndexedDB) ---------- */
const MOTIV_DB="protocol_media", MOTIV_STORE="images";
let motivImages=[]; // {id,url}
function openMotivDB(){
 return new Promise((resolve,reject)=>{
  const req=indexedDB.open(MOTIV_DB,1);
  req.onupgradeneeded=()=>{req.result.createObjectStore(MOTIV_STORE,{keyPath:"id"})};
  req.onsuccess=()=>resolve(req.result);
  req.onerror=()=>reject(req.error);
 });
}
async function loadMotivImages(){
 try{
  const db=await openMotivDB();
  const tx=db.transaction(MOTIV_STORE,"readonly");
  const all=await new Promise((res,rej)=>{const r=tx.objectStore(MOTIV_STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
  motivImages.forEach(m=>URL.revokeObjectURL(m.url));
  motivImages=all.map(r=>({id:r.id,url:URL.createObjectURL(r.blob)}));
 }catch(e){motivImages=[]}
 if(TAB==="motiv")render();
}
function fileToCompressedBlob(file){
 return new Promise((resolve,reject)=>{
  const img=new Image();
  const fr=new FileReader();
  fr.onload=()=>{
   img.onload=()=>{
    const max=1400;let w=img.width,h=img.height;
    if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    c.toBlob(b=>b?resolve(b):reject(new Error("toBlob failed")),"image/jpeg",0.85);
   };
   img.onerror=reject;img.src=fr.result;
  };
  fr.onerror=reject;fr.readAsDataURL(file);
 });
}
async function addMotivFiles(fileList){
 const db=await openMotivDB();
 for(const file of fileList){
  if(!file.type.startsWith("image/"))continue;
  const blob=await fileToCompressedBlob(file);
  await new Promise((res,rej)=>{
   const tx=db.transaction(MOTIV_STORE,"readwrite");
   tx.objectStore(MOTIV_STORE).put({id:uid(),blob});
   tx.oncomplete=res;tx.onerror=()=>rej(tx.error);
  });
 }
 await loadMotivImages();
 toast("Photos added");
}
async function delMotiv(id){
 const db=await openMotivDB();
 await new Promise((res,rej)=>{
  const tx=db.transaction(MOTIV_STORE,"readwrite");
  tx.objectStore(MOTIV_STORE).delete(id);
  tx.oncomplete=res;tx.onerror=()=>rej(tx.error);
 });
 await loadMotivImages();
}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0}return Math.abs(h)}
function todaysMotivIndex(){return motivImages.length?hashStr(todayKey())%motivImages.length:0}

}
